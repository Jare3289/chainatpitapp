<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8" />
    <title>รายงานการมาเรียนรายห้อง | CNP APP</title>
    <meta content='width=device-width, initial-scale=1.0, shrink-to-fit=no' name='viewport' />
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../public/css/style.css"></head>
<body class="bg-light">
    <div class="wrapper">
        <div class="sidebar" id="mainSidebar"></div>

        <main class="app-main main-panel d-flex flex-column min-vh-100 d-flex flex-column min-vh-100" style="background-color: #f8fafc;" id="main" tabindex="-1">
            <div class="app-content-header main-header sticky-top bg-white border-bottom shadow-sm">
                <div class="container-fluid d-flex align-items-center justify-content-between py-2">
                    <div class="d-flex align-items-center gap-3">
                        <button class="btn btn-link text-dark d-lg-none" onclick="toggleSidebar()"><i class="bi bi-list fs-4"></i></button>
                        <h5 class="mb-0 fw-bold"><i class="bi bi-grid-3x3-gap-fill text-primary me-2"></i>รายงานการมาเรียนรายห้อง</h5>
                        <div class="ms-3 badge bg-white text-dark border shadow-sm d-none d-md-inline-flex align-items-center px-3 py-2" style="border-radius: 12px;">
                            <i class="bi bi-calendar-event text-primary me-2"></i>
                            <span id="currentDateDisplay">Loading...</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="app-content page-content content-padding flex-grow-1 d-flex flex-column py-4 flex-grow-1 d-flex flex-column">
                <div class="container-fluid">
                    <div class="row g-4" id="roomReportGrid">
                        <!-- Class Cards here -->
                        <div class="col-12 text-center py-5">
                            <div class="spinner-border text-primary"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div><script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../public/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = await checkAuth(['teacher', 'admin']);
            if (user) {
                updateDateDisplay();
                loadRoomReport();
            }
        });

        function updateDateDisplay() {
            const now = new Date();
            document.getElementById('currentDateDisplay').textContent = thDate(now);
        }

        async function loadRoomReport() {
            try {
                const res = await fetch('../api/teacher/room-report.php');
                const data = await res.json();
                if (data.success) {
                    renderCards(data.report);
                }
            } catch (e) { }
        }

        function renderCards(report) {
            const grid = $('#roomReportGrid');
            grid.empty();

            if (report.length === 0) {
                grid.html('<div class="col-12 text-center py-5 text-muted">ไม่พบข้อมูลห้องเรียน</div>');
                return;
            }

            report.forEach(r => {
                const statusColor = r.status === 'Checked' ? 'success' : 'warning';
                const statusText = r.status === 'Checked' ? 'เช็คแล้ว' : 'ยังไม่เช็ค';
                
                const card = `
                    <div class="col-12 col-md-6 col-lg-4 col-xl-3">
                        <div class="card border-0 shadow-sm rounded-4 overflow-hidden h-100 card-room-report">
                            <div class="card-header bg-white border-0 pt-4 px-4 pb-1 d-flex justify-content-between align-items-center">
                                <h4 class="mb-0 fw-bold text-navy">ชั้น ${r.class_name}</h4>
                                <span class="badge bg-${statusColor}-subtle text-${statusColor} rounded-pill px-3">${statusText}</span>
                            </div>
                            <div class="card-body px-4 pb-4">
                                <div class="row g-2 text-center mt-2">
                                    <div class="col-3">
                                        <div class="p-2 bg-success-subtle rounded-3">
                                            <small class="d-block text-success fw-bold">มา</small>
                                            <span class="fs-5 fw-bold text-success">${r.present}</span>
                                        </div>
                                    </div>
                                    <div class="col-3">
                                        <div class="p-2 bg-danger-subtle rounded-3">
                                            <small class="d-block text-danger fw-bold">ขาด</small>
                                            <span class="fs-5 fw-bold text-danger">${r.absent}</span>
                                        </div>
                                    </div>
                                    <div class="col-3">
                                        <div class="p-2 bg-warning-subtle rounded-3">
                                            <small class="d-block text-warning-emphasis fw-bold">ลา</small>
                                            <span class="fs-5 fw-bold text-warning-emphasis">${r.leave}</span>
                                        </div>
                                    </div>
                                    <div class="col-3">
                                        <div class="p-2 bg-light rounded-3">
                                            <small class="d-block text-muted fw-bold">สาย</small>
                                            <span class="fs-5 fw-bold text-dark">${r.late}</span>
                                        </div>
                                    </div>
                                </div>
                                <div class="mt-4 pt-3 border-top d-flex justify-content-between align-items-center">
                                    <small class="text-muted"><i class="bi bi-people me-1"></i>นักเรียนทั้งหมด ${r.total} คน</small>
                                    <a href="attendance_daily.html?class_name=${encodeURIComponent(r.class_name)}" class="btn btn-primary btn-sm rounded-pill px-3">รายละเอียด</a>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                grid.append(card);
            });
        }
    </script>
</body>
</html>
