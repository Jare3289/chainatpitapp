    <div class="container py-5 fade-in">
        <div class="row justify-content-center">
            <div class="col-lg-7">
                <div class="d-flex align-items-center mb-4">
                    <div class="bg-white p-3 rounded-4 shadow-sm me-3">
                        <i class="bi bi-star-fill text-warning fs-3"></i>
                    </div>
                    <div>
                        <h2 class="fw-bold text-navy mb-1">บันทึกคะแนนพฤติกรรม</h2>
                        <p class="text-muted mb-0">บันทึกรายการความดีหรือการทำผิดวินัยของนักเรียน</p>
                    </div>
                </div>

                <div class="card shadow-lg border-0">
                    <div class="card-header card-header-custom d-flex align-items-center">
                        <i class="bi bi-plus-circle me-2"></i> บันทึกรายการใหม่
                    </div>
                    <div class="card-body p-4 p-md-5">
                        <form id="creditForm">
                            <div class="row g-3 mb-4">
                                <div class="col-md-6">
                                    <label class="form-label">ชั้นเรียน</label>
                                    <select id="classSelect" class="form-select" onchange="loadStudents()">
                                        <option value="">-- เลือกชั้นเรียน --</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">นักเรียน</label>
                                    <select id="studentSelect" class="form-select" required>
                                        <option value="">-- เลือกนักเรียน --</option>
                                    </select>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label d-block mb-3">ประเภทการบันทึก</label>
                                <div class="row g-2">
                                    <div class="col-6">
                                        <input type="radio" class="btn-check" name="type" id="typeAdd" value="บวก" checked>
                                        <label class="btn btn-outline-success w-100 py-3 rounded-4 fw-bold" for="typeAdd">
                                            <i class="bi bi-plus-circle-fill me-2"></i>บวกคะแนน
                                        </label>
                                    </div>
                                    <div class="col-6">
                                        <input type="radio" class="btn-check" name="type" id="typeSub" value="ลบ">
                                        <label class="btn btn-outline-danger w-100 py-3 rounded-4 fw-bold" for="typeSub">
                                            <i class="bi bi-dash-circle-fill me-2"></i>หักคะแนน
                                        </label>
                                    </div>
                                </div>
                            </div>

                            <div class="row g-3 mb-4">
                                <div class="col-md-4">
                                    <label class="form-label">จำนวนคะแนน</label>
                                    <div class="input-group">
                                        <input type="number" id="points" class="form-control text-center fw-bold" min="1" value="1" required>
                                        <span class="input-group-text bg-light">แต้ม</span>
                                    </div>
                                </div>
                                <div class="col-md-8">
                                    <label class="form-label">วันที่เกิดเหตุ</label>
                                    <input type="date" id="dateSelect" class="form-control" required>
                                </div>
                            </div>

                            <div class="mb-5">
                                <label class="form-label">รายละเอียด / เหตุผล</label>
                                <textarea id="reason" class="form-control" rows="3" placeholder="ระบุรายละเอียดการบันทึก..." required></textarea>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 shadow-sm py-3">
                                <i class="bi bi-check2-circle me-2"></i>บันทึกข้อมูลคะแนน
                            </button>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../public/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = await checkAuth('teacher');
            if (user) {
                document.getElementById('userNameDisplay').innerText = user.username;
                document.getElementById('dateSelect').valueAsDate = new Date();
                
                try {
                    const res = await fetch('../api/teacher/my-classes.php');
                    if (res.ok) {
                        const data = await res.json();
                        const select = document.getElementById('classSelect');
                        data.classes.forEach(c => {
                            let opt = document.createElement('option');
                            opt.value = c.trim();
                            opt.innerHTML = c.trim();
                            select.appendChild(opt);
                        });
                    }
                } catch(e) {}
            }
        });

        async function loadStudents() {
            const className = document.getElementById('classSelect').value;
            if (!className) return;

            try {
                // Using the specific teacher student API or generalized one
                const res = await fetch(`../api/teacher/get-advisory-students.php?room=${encodeURIComponent(className)}`);
                if (res.ok) {
                    const data = await res.json();
                    const select = document.getElementById('studentSelect');
                    select.innerHTML = '<option value="">-- เลือกนักเรียน --</option>';
                    data.data.forEach(student => {
                        let opt = document.createElement('option');
                        opt.value = student.id;
                        opt.innerHTML = `${student.student_id} - ${student.prefix}${student.first_name_th} ${student.last_name_th}`;
                        select.appendChild(opt);
                    });
                }
            } catch(e) {}
        }

        document.getElementById('creditForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const student_id = document.getElementById('studentSelect').value;
            const type = document.querySelector('input[name="type"]:checked').value;
            const points = document.getElementById('points').value;
            const reason = document.getElementById('reason').value;
            const date = document.getElementById('dateSelect').value;

            if (!student_id) return Swal.fire('แจ้งเตือน', 'กรุณาเลือกนักเรียน', 'warning');

            try {
                const res = await fetch('../api/teacher/credit.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ student_id, type, points, reason, date })
                });

                const data = await res.json();
                if (data.success) {
                    Swal.fire({
                        icon: 'success',
                        title: 'บันทึกสำเร็จ',
                        text: 'บันทึกข้อมูลคะแนนเรียบร้อยแล้ว',
                        timer: 2000,
                        showConfirmButton: false
                    });
                    document.getElementById('creditForm').reset();
                    document.getElementById('dateSelect').valueAsDate = new Date();
                } else {
                    Swal.fire('เกิดข้อผิดพลาด', data.error || 'ไม่สามารถบันทึกได้', 'error');
                }
            } catch (err) {
                Swal.fire('Error', 'Server connection error', 'error');
            }
        });
    </script>
