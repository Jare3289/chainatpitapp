<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8" />
    <title>บันทึกหลังแผนการสอน | CNP APP</title>
    <meta content='width=device-width, initial-scale=1.0, shrink-to-fit=no' name='viewport' />
    
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700;900&family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <!-- Core CSS -->
    <link rel="stylesheet" href="../public/css/style.css">
    
    <style>
        body { font-family: 'Google Sans', 'Sarabun', sans-serif; background-color: #f4f7fa; color: #1e293b; }
        
        .bg-gradient-navy {
            background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 100%);
        }
        .text-navy { color: #1e3a8a; }

        .dashboard-panel {
            background: white;
            border-radius: 24px;
            padding: 25px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 20px rgba(0,0,0,0.01);
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
    <div class="wrapper">
        <aside class="sidebar" id="mainSidebar"></aside>

        <main class="main-panel d-flex flex-column min-vh-100" id="main">
            <div class="app-content page-content flex-grow-1">
                <div class="container-fluid">
                    
                    <!-- Back Button and Header -->
                    <div class="d-flex align-items-center gap-3 mb-4">
                        <a href="teacher_supervision.html" class="btn btn-light rounded-circle shadow-sm border" style="width: 45px; height: 45px; display: flex; align-items: center; justify-content: center;">
                            <i class="bi bi-arrow-left fs-5"></i>
                        </a>
                        <div>
                            <h4 class="fw-black text-navy mb-0">บันทึกหลังการสอน</h4>
                            <div class="text-muted small">บันทึกสะท้อนผลการจัดการเรียนรู้ของครูผู้รับนิเทศหลังเสร็จสิ้นการสอนในห้องเรียน</div>
                        </div>
                    </div>

                    <div class="dashboard-panel">
                        <h5 class="fw-black text-navy mb-4"><i class="bi bi-pencil-square me-2 text-primary"></i>บันทึกหลังการจัดการเรียนรู้ (หลังการสอน)</h5>
                        <div id="post-teach-content-box">
                            <div class="text-center py-5 text-muted small">กำลังโหลดข้อมูล...</div>
                        </div>
                    </div>

                </div>
            </div>
            <footer id="footer-container" class="app-footer text-center text-md-start mt-auto pb-4"></footer>
        </main>
    </div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../public/js/main.js"></script>
    <script>
        let currentUser = null;

        document.addEventListener('DOMContentLoaded', async () => {
            currentUser = await checkAuth(['teacher', 'admin']);
            if (currentUser) {
                await loadPostTeachData();
            }
        });

        function getUrlBookingId() {
            const urlParams = new URLSearchParams(window.location.search);
            return parseInt(urlParams.get('booking_id')) || 0;
        }

        async function loadPostTeachData() {
            try {
                const bookingId = getUrlBookingId();
                if (currentUser.role === 'admin' && bookingId === 0) {
                    document.getElementById('post-teach-content-box').innerHTML = `
                        <div class="alert alert-info border-0 shadow-sm rounded-4 mb-0 text-center py-4" style="background-color: #ebf5ff; border-left: 4px solid #1e3a8a !important; color: #1e3a8a;">
                            <i class="bi bi-info-circle-fill fs-3 mb-2 d-block text-primary"></i>
                            <span class="small fw-bold">กรุณาเลือกรายการคิวนิเทศจากแถบด้านบนเพื่อดูหรือบันทึกหลังการสอน</span>
                        </div>
                    `;
                    return;
                }

                const url = bookingId > 0 ? `../api/teacher/supervision_get.php?booking_id=${bookingId}` : '../api/teacher/supervision_get.php';
                const res = await fetch(url);
                const data = await res.json();
                if (data.success) {
                    renderPostTeachContent(data.booking);
                }
            } catch (err) {
                console.error("Error loading post teaching: ", err);
            }
        }

        function renderPostTeachContent(booking) {
            const box = document.getElementById('post-teach-content-box');
            if (!booking) {
                box.innerHTML = `<div class="text-center py-5 text-muted"><i class="bi bi-lock fs-1"></i><p class="mt-3 small">กรุณาทำการจองคิวนิเทศก่อนดำเนินการบันทึกหลังการสอน</p></div>`;
            } else if (booking.status === 'pending' || booking.status === 'approved') {
                box.innerHTML = `<div class="text-center py-5 text-muted"><i class="bi bi-lock fs-1 text-warning"></i><p class="mt-3 small">การบันทึกหลังแผนจะปลดล็อกเมื่อคณะกรรมการนิเทศในห้องเรียนเสร็จสมบูรณ์แล้ว</p></div>`;
            } else {
                let recordData = {
                    knowledge: '',
                    characteristics: '',
                    competencies: '',
                    problems: '',
                    solutions: '',
                    sign_date: new Date().toISOString().split('T')[0]
                };

                if (booking.post_teaching_record) {
                    try {
                        const parsed = JSON.parse(booking.post_teaching_record);
                        if (parsed && typeof parsed === 'object') {
                            recordData = { ...recordData, ...parsed };
                        } else {
                            recordData.knowledge = booking.post_teaching_record;
                        }
                    } catch (e) {
                        recordData.knowledge = booking.post_teaching_record;
                    }
                }

                box.innerHTML = `
                    <div class="row g-4">
                        <div class="col-md-12">
                            <h6 class="fw-bold text-navy border-bottom pb-2 mb-3"><i class="bi bi-journal-text me-2"></i>12. บันทึกผลหลังการจัดการเรียนรู้</h6>
                        </div>
                        
                        <div class="col-md-12 mb-3">
                            <label class="form-label small fw-bold text-muted mb-1">ด้านความรู้</label>
                            <textarea class="form-control border shadow-sm rounded-3 p-3" id="post_knowledge" rows="3" placeholder="สรุปผลการเรียนรู้ด้านความรู้ (Knowledge)..." required>${recordData.knowledge}</textarea>
                        </div>
                        
                        <div class="col-md-12 mb-3">
                            <label class="form-label small fw-bold text-muted mb-1">ด้านคุณลักษณะอันพึงประสงค์</label>
                            <textarea class="form-control border shadow-sm rounded-3 p-3" id="post_characteristics" rows="3" placeholder="สรุปผลการเรียนรู้ด้านคุณลักษณะอันพึงประสงค์ (Affective)..." required>${recordData.characteristics}</textarea>
                        </div>
                        
                        <div class="col-md-12 mb-3">
                            <label class="form-label small fw-bold text-muted mb-1">ด้านสมรรถนะ</label>
                            <textarea class="form-control border shadow-sm rounded-3 p-3" id="post_competencies" rows="3" placeholder="สรุปผลการเรียนรู้ด้านสมรรถนะสำคัญของผู้เรียน (Psychomotor/Competency)..." required>${recordData.competencies}</textarea>
                        </div>
                        
                        <div class="col-md-12 mb-3">
                            <label class="form-label small fw-bold text-muted mb-1"><i class="bi bi-exclamation-triangle-fill text-warning me-1"></i> ปัญหาที่พบ</label>
                            <textarea class="form-control border shadow-sm rounded-3 p-3" id="post_problems" rows="3" placeholder="ปัญหา อุปสรรค ที่พบระหว่างการสอน..." required>${recordData.problems}</textarea>
                        </div>
                        
                        <div class="col-md-12 mb-3">
                            <label class="form-label small fw-bold text-muted mb-1"><i class="bi bi-lightbulb-fill text-success me-1"></i> แนวทางการแก้ไขปัญหา</label>
                            <textarea class="form-control border shadow-sm rounded-3 p-3" id="post_solutions" rows="3" placeholder="แนวทางหรือข้อเสนอแนะในการแก้ไขปัญหาเพื่อปรับปรุงพัฒนา..." required>${recordData.solutions}</textarea>
                        </div>

                        <div class="col-md-12">
                            <h6 class="fw-bold text-navy border-top border-bottom pt-3 pb-2 mb-3 mt-2"><i class="bi bi-pencil-fill me-2"></i>ลงชื่อผู้สอน (ผู้รับการนิเทศ)</h6>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label small fw-bold text-muted mb-1">ชื่อผู้รับการนิเทศ</label>
                            <input type="text" class="form-control bg-light" value="${booking.teacher_name}" readonly disabled>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label small fw-bold text-muted mb-1">ตำแหน่ง / วิทยฐานะ</label>
                            <input type="text" class="form-control bg-light" value="${(booking.teacher_position || 'ครู') + ' ' + (booking.academic_standing || 'ไม่มีวิทยฐานะ')}" readonly disabled>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label small fw-bold text-muted mb-1">วันที่ลงนาม</label>
                            <input type="date" class="form-control border shadow-sm rounded-3" id="post_sign_date" value="${recordData.sign_date}">
                        </div>

                        <div class="col-md-12 text-end mt-4">
                            <button class="btn btn-navy rounded-pill fw-black px-4 py-3 shadow" onclick="submitPostTeaching(${booking.id})">
                                <i class="bi bi-check-circle-fill me-2"></i> บันทึกหลังการสอน
                            </button>
                        </div>
                    </div>
                `;
            }
        }

        async function submitPostTeaching(id) {
            const knowledge = document.getElementById('post_knowledge').value;
            const characteristics = document.getElementById('post_characteristics').value;
            const competencies = document.getElementById('post_competencies').value;
            const problems = document.getElementById('post_problems').value;
            const solutions = document.getElementById('post_solutions').value;
            const sign_date = document.getElementById('post_sign_date').value;

            if (!knowledge.trim() || !characteristics.trim() || !competencies.trim() || !problems.trim() || !solutions.trim()) {
                Swal.fire({ icon: 'warning', title: 'กรุณากรอกข้อมูลให้ครบถ้วนทุกช่อง' });
                return;
            }

            const payload = {
                knowledge,
                characteristics,
                competencies,
                problems,
                solutions,
                sign_date
            };

            Swal.fire({
                title: 'กำลังบันทึกข้อมูล...',
                allowOutsideClick: false,
                didOpen: () => Swal.showLoading()
            });

            try {
                const res = await fetch('../api/teacher/supervision_post_teach.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ booking_id: id, post_teaching_record: JSON.stringify(payload) })
                });
                const d = await res.json();
                if (d.success) {
                    Swal.fire({ icon: 'success', title: 'บันทึกสำเร็จ!', text: d.message, confirmButtonColor: '#1e3a8a' }).then(() => {
                        window.location.href = currentUser.role === 'admin' ? 'supervision.html' : 'teacher_supervision.html';
                    });
                } else {
                    Swal.fire({ icon: 'error', title: 'ผิดพลาด', text: d.error });
                }
            } catch (err) {
                Swal.fire({ icon: 'error', title: 'การเชื่อมต่อมีปัญหา' });
            }
        }
    </script>
</body>

</html>
