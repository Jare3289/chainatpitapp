<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8" />
    <title>รายชื่อนักเรียนในหัวข้อ | CNP APP</title>
    <meta content='width=device-width, initial-scale=1.0, shrink-to-fit=no' name='viewport' />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="../public/css/style.css"></head>
<body class="bg-light">
    <div class="wrapper">
        <div class="sidebar" id="mainSidebar"></div>

        <main class="app-main main-panel d-flex flex-column min-vh-100 d-flex flex-column min-vh-100" style="background-color: #f8fafc;" id="main" tabindex="-1">
            <div class="app-content-header main-header sticky-top bg-white shadow-sm">
                <div class="container-fluid d-flex align-items-center justify-content-between py-2">
                    <div class="d-flex align-items-center gap-3">
                        <button class="btn btn-link text-navy d-lg-none px-0" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
                        <h5 class="mb-0 fw-bold text-navy">ข้อมูลนักเรียนในห้องเรียนที่รับผิดชอบ</h5>
                    </div>
                </div>
            </div>

            <div class="app-content page-content py-4 flex-grow-1 d-flex flex-column py-4 flex-grow-1 d-flex flex-column">
                <div class="container-fluid">
                    <div class="card border-0 shadow-sm rounded-4 mb-4">
                        <div class="card-body p-4">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="small fw-bold text-muted mb-2">เลือกห้องเรียน</label>
                                    <select id="classSelect" class="form-select border-0 bg-light py-2 rounded-pill shadow-none" onchange="loadStudents()"></select>
                                </div>
                                <div class="col-md-6">
                                    <label class="small fw-bold text-muted mb-2">ค้นหาชื่อ/รหัส</label>
                                    <div class="input-group">
                                        <span class="input-group-text border-0 bg-light rounded-start-pill"><i class="fas fa-search text-muted"></i></span>
                                        <input type="text" id="searchInput" class="form-control border-0 bg-light py-2 rounded-end-pill shadow-none" placeholder="พิมพ์ชื่อเพื่อค้นหา..." onkeyup="filterTable()">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="card border-0 shadow-sm rounded-4 overflow-hidden mb-5">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0 table-modern" id="studentTable">
                                <thead class="bg-light">
                                    <tr>
                                        <th class="ps-4">เลขที่</th>
                                        <th>รหัสนักเรียน</th>
                                        <th>ชื่อ-นามสกุล</th>
                                        <th>ชื่อเล่น</th>
                                        <th class="text-end pe-4">จัดการ</th>
                                    </tr>
                                </thead>
                                <tbody id="studentTableBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- VIEW MODAL (Reuse from Admin or similar) -->
    <div class="modal fade" id="profileModal" tabindex="-1">
        <!-- Content will be injected dynamically -->
    </div><script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../public/js/main.js"></script>
    <script>

        document.addEventListener('DOMContentLoaded', async () => {
            const user = await checkAuth('teacher');
            if (user) {
                await loadMyClasses();
                loadStudents();
            }
        });

        async function loadMyClasses() {
            const res = await fetch('../api/teacher/my-classes.php');
            if (res.ok) {
                const data = await res.json();
                const select = document.getElementById('classSelect');
                const classes = data.classes || [];
                select.innerHTML = '<option value="">เลือกห้องเรียน...</option>';
                classes.forEach(c => select.add(new Option(c.trim(), c.trim())));

                const advisoryRoom = data.advisory_room;
                if (advisoryRoom) {
                    const roomVal = advisoryRoom.toString().trim();
                    let exists = Array.from(select.options).some(opt => opt.value === roomVal);
                    if (!exists) select.add(new Option(roomVal, roomVal));
                    select.value = roomVal;
                } else if (classes.length > 0) {
                    select.value = classes[0].trim();
                }
                if (select.value) loadStudents();
            }
        }

        async function loadStudents() {
            const className = document.getElementById('classSelect').value;
            if (!className) return;

            const res = await fetch(`../api/teacher/attendance.php?type=daily&class_name=${encodeURIComponent(className)}`);
            const result = await res.json();
            
            const tbody = document.getElementById('studentTableBody');
            if (result.success) {
                tbody.innerHTML = result.students.map(s => `
                <tr>
                    <td class="ps-4 fw-bold text-muted">${s.number_in_class || '-'}</td>
                    <td class="small fw-bold text-navy">${s.student_id}</td>
                    <td class="fw-semibold">${s.full_name_th || (s.first_name_th + ' ' + s.last_name_th)}</td>
                    <td class="text-muted">${s.nickname || '-'}</td>
                    <td class="text-end pe-4">
                        <button class="btn btn-sm btn-outline-primary rounded-pill px-3" onclick="viewDetails(${s.id})">ดูประวัติ</button>
                    </td>
                </tr>
            `).join('');
            }
        }

        function filterTable() {
            const input = document.getElementById("searchInput").value.toLowerCase();
            const rows = document.getElementById("studentTableBody").getElementsByTagName("tr");
            for (let row of rows) {
                row.style.display = row.innerText.toLowerCase().includes(input) ? "" : "none";
            }
        }

        function viewDetails(id) {
            Swal.fire('Info', 'ฟังก์ชันดูรายละเอียดเชิงลึกกำลังถูกย้ายมาจากส่วนกลางครับ', 'info');
        }
    </script>
</body>
</html>
