<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8"/>
    <title>จัดการตารางสอน | CNP APP</title>
    <meta content='width=device-width, initial-scale=1.0, shrink-to-fit=no' name='viewport'/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="../public/css/style.css">
    <style>
        body { font-family:'Google Sans','Sarabun',sans-serif; background:#f8fafc; }
        .bg-gradient-navy { background:linear-gradient(135deg,#1e3a8a 0%,#3b82f6 100%) !important; }
        .banner-icon-bg { position:absolute; right:-20px; bottom:-20px; font-size:12rem; opacity:.08; transform:rotate(-15deg); color:white; }
        .action-card { border-radius:16px; border:1px solid #f1f5f9; background:#fff; transition:.2s; }
        .action-card:hover { box-shadow:0 8px 30px rgba(30,58,138,.08); transform:translateY(-2px); }
        .tt-row-card { border:1px solid #f1f5f9; border-radius:14px; padding:14px 16px;
            background:#fff; margin-bottom:8px; display:flex; align-items:center; gap:12px; }
        .tt-row-card .period-dot { width:36px; height:36px; border-radius:10px; display:flex;
            align-items:center; justify-content:center; font-weight:800; font-size:.85rem; color:#fff; flex-shrink:0; }
        .day-badge { font-size:.7rem; font-weight:800; padding:3px 10px; border-radius:20px;
            background:#eff6ff; color:#1d4ed8; display:inline-block; }
        .modal-content { border-radius:20px; border:none; }
        .modal-header { border-bottom:1px solid #f1f5f9; padding:20px 24px 16px; }
        .form-label { font-weight:700; font-size:.82rem; color:#475569; }
        .form-control, .form-select { border-radius:10px; border:1.5px solid #e2e8f0; font-size:.9rem; }
        .form-control:focus, .form-select:focus { border-color:#3b82f6; box-shadow:0 0 0 3px rgba(59,130,246,.1); }
        .btn-primary-navy { background:#1e3a8a; border:none; color:#fff; border-radius:12px; font-weight:700; }
        .btn-primary-navy:hover { background:#1d4ed8; color:#fff; }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="sidebar" id="mainSidebar"></div>
    <main class="main-panel d-flex flex-column min-vh-100" id="main">
        <div id="header-container"></div>
        <div class="app-content page-content flex-grow-1 py-4">
            <div class="container-fluid">

                <!-- BANNER -->
                <div class="row g-4 mb-4">
                    <div class="col-12">
                        <div class="card border-0 bg-gradient-navy rounded-4 position-relative overflow-hidden shadow-lg">
                            <i class="fas fa-table-cells-large banner-icon-bg"></i>
                            <div class="card-body p-4 p-md-5 text-white position-relative z-1 d-flex justify-content-between align-items-center">
                                <div>
                                    <h4 class="opacity-75 fw-medium mb-1">ผู้ดูแลระบบ</h4>
                                    <h1 class="fw-black mb-1">จัดการตารางสอน</h1>
                                    <p class="mb-0 opacity-75">เพิ่ม แก้ไข ลบ ข้อมูลตารางสอนคาบ 0–11</p>
                                </div>
                                <div class="d-flex gap-2 flex-wrap">
                                    <a href="timetable.html" class="btn btn-light fw-bold rounded-3">
                                        <i class="bi bi-eye me-1"></i> ดูตารางสอน
                                    </a>
                                    <button class="btn btn-success fw-bold rounded-3" onclick="openImport()">
                                        <i class="bi bi-cloud-arrow-up me-1"></i> นำเข้า Excel
                                    </button>
                                    <button class="btn btn-danger fw-bold rounded-3" onclick="openReplaceImport()">
                                        <i class="bi bi-arrow-repeat me-1"></i> แทนที่ทั้งหมด
                                    </button>
                                    <button class="btn btn-warning fw-bold rounded-3" onclick="openAddModal()">
                                        <i class="bi bi-plus-lg me-1"></i> เพิ่มคาบสอน
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- FILTER -->
                <div class="card border-0 shadow-sm rounded-4 mb-4">
                    <div class="card-body p-3">
                        <div class="row g-2 align-items-end">
                            <div class="col-12 col-md-4">
                                <label class="form-label mb-1">ครูผู้สอน</label>
                                <select id="filterTeacher" class="form-select">
                                    <option value="">— ครูทุกคน —</option>
                                </select>
                            </div>
                            <div class="col-6 col-md-3">
                                <label class="form-label mb-1">ห้องเรียน (ระบบ 3 หลัก)</label>
                                <select id="filterClassroom" class="form-select">
                                    <option value="">— ทุกห้อง —</option>
                                </select>
                            </div>
                            <div class="col-6 col-md-2">
                                <label class="form-label mb-1">วัน</label>
                                <select id="filterDay" class="form-select">
                                    <option value="">— ทุกวัน —</option>
                                    <option value="1">จันทร์</option><option value="2">อังคาร</option>
                                    <option value="3">พุธ</option><option value="4">พฤหัสบดี</option>
                                    <option value="5">ศุกร์</option>
                                </select>
                            </div>
                            <div class="col-12 col-md-3 d-flex gap-2">
                                <button class="btn btn-primary-navy flex-fill rounded-3 shadow-sm" onclick="loadData()">
                                    <i class="bi bi-search me-1"></i>ค้นหา
                                </button>
                                <button class="btn btn-light rounded-3 border" onclick="clearFilters()"><i class="bi bi-arrow-clockwise"></i></button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- STATS -->
                <div class="row g-3 mb-4">
                    <div class="col-6 col-md-3">
                        <div class="action-card p-3 text-center">
                            <div class="fw-black fs-2 text-primary" id="statTotal">0</div>
                            <div class="text-muted small fw-bold">คาบสอนทั้งหมด</div>
                        </div>
                    </div>
                    <div class="col-6 col-md-3">
                        <div class="action-card p-3 text-center">
                            <div class="fw-black fs-2 text-success" id="statTeachers">0</div>
                            <div class="text-muted small fw-bold">ครูผู้สอน</div>
                        </div>
                    </div>
                    <div class="col-6 col-md-3">
                        <div class="action-card p-3 text-center">
                            <div class="fw-black fs-2 text-warning" id="statClasses">0</div>
                            <div class="text-muted small fw-bold">ห้องเรียน</div>
                        </div>
                    </div>
                    <div class="col-6 col-md-3">
                        <div class="action-card p-3 text-center">
                            <div class="fw-black fs-2 text-danger" id="statSubjects">0</div>
                            <div class="text-muted small fw-bold">วิชา</div>
                        </div>
                    </div>
                </div>

                <!-- TABLE LIST -->
                <div class="card border-0 shadow-sm rounded-4">
                    <div class="card-header bg-white border-0 py-3 px-4 d-flex justify-content-between align-items-center">
                        <h5 class="fw-black mb-0 text-navy">รายการตารางสอน</h5>
                        <span class="badge bg-primary-subtle text-primary rounded-pill px-3 fw-bold" id="countLabel">0 รายการ</span>
                    </div>
                    <div class="card-body p-3" id="listContainer">
                        <div class="text-center py-5 text-muted">
                            <div class="spinner-border text-primary mb-3"></div>
                            <p>กำลังโหลด...</p>
                        </div>
                    </div>
                </div>

            </div>
        </div>
        <footer id="footer-container" class="mt-auto"></footer>
    </main>
</div>

<!-- ADD / EDIT MODAL -->
<div class="modal fade" id="ttModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title fw-black" id="modalTitle">เพิ่มคาบสอน</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <input type="hidden" id="editId">
                <div class="row g-3">
                    <div class="col-md-12">
                        <label class="form-label">ครูผู้สอน <span class="text-danger">*</span></label>
                        <select id="fTeacher" class="form-select"></select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">วันในสัปดาห์ <span class="text-danger">*</span></label>
                        <select id="fDay" class="form-select">
                            <option value="1">จันทร์</option><option value="2">อังคาร</option>
                            <option value="3">พุธ</option><option value="4">พฤหัสบดี</option>
                            <option value="5">ศุกร์</option><option value="6">เสาร์</option>
                            <option value="7">อาทิตย์</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">คาบที่ <span class="text-danger">*</span></label>
                        <select id="fPeriod" class="form-select">
                            <option value="0">0 (กิจกรรมหน้าเสาธง)</option>
                            <option value="1">1</option><option value="2">2</option><option value="3">3</option>
                            <option value="4">4</option><option value="5">5</option><option value="6">6</option>
                            <option value="7">7</option><option value="8">8</option><option value="9">9</option>
                            <option value="10">10</option><option value="11">11</option>
                        </select>
                    </div>
                    <div class="col-md-8">
                        <label class="form-label">ชื่อวิชา <span class="text-danger">*</span></label>
                        <input type="text" id="fSubject" class="form-control" placeholder="เช่น คณิตศาสตร์">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">รหัสวิชา</label>
                        <input type="text" id="fCode" class="form-control" placeholder="เช่น ค21101">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">ชั้น</label>
                        <select id="fGrade" class="form-select">
                            <option value="">—</option>
                            <option>ม.1</option><option>ม.2</option><option>ม.3</option>
                            <option>ม.4</option><option>ม.5</option><option>ม.6</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">ห้อง</label>
                        <input type="text" id="fClass" class="form-control" placeholder="เช่น 1/1">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">ห้องที่สอน (อาคาร/ห้อง)</label>
                        <input type="text" id="fRoom" class="form-control" placeholder="เช่น อาคาร 1 ห้อง 101">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">ปีการศึกษา</label>
                        <input type="text" id="fYear" class="form-control" placeholder="เช่น 2568">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">ภาคเรียน</label>
                        <select id="fSem" class="form-select">
                            <option value="1">1</option><option value="2">2</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">หมายเหตุ</label>
                        <input type="text" id="fNote" class="form-control" placeholder="หมายเหตุ (ถ้ามี)">
                    </div>
                </div>
            </div>
            <div class="modal-footer border-0 px-4 pb-4">
                <button type="button" class="btn btn-light rounded-3 px-4" data-bs-dismiss="modal">ยกเลิก</button>
                <button type="button" class="btn btn-primary-navy rounded-3 px-4 fw-bold" onclick="saveRecord()">
                    <i class="bi bi-check-lg me-1"></i> บันทึก
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="../public/js/main.js"></script>
<script src="../public/js/importModal.js"></script>
<script>
const DAYS = ['','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์','อาทิตย์'];
const P_COLORS = ['#6366f1','#0ea5e9','#10b981','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#84cc16','#f97316','#ec4899','#14b8a6','#a855f7'];
let ttModal;

document.addEventListener('DOMContentLoaded', async () => {
    const user = await checkAuth('admin');
    if (!user) return;
    ttModal = new bootstrap.Modal(document.getElementById('ttModal'));
    populateClassroomFilter();
    await loadTeachers();
    loadData();
});

function populateClassroomFilter() {
    const sel = document.getElementById('filterClassroom');
    if (!sel) return;
    let html = '<option value="">— ทุกห้อง —</option>';
    // Generate ม.1-6, Rooms 1-15
    for (let g = 1; g <= 6; g++) {
        for (let r = 1; r <= 15; r++) {
            const val = `${g}${r.toString().padStart(2, '0')}`;
            html += `<option value="${val}">ม.${val}</option>`;
        }
    }
    sel.innerHTML = html;
}

function openImport() {
    initImportModal({
        type: 'timetable',
        apiUrl: '../api/admin/upload-timetable.php',
        templateBaseUrl: '../api/admin/download-template.php?type=timetable',
        onSuccess: loadData
    });
}

async function openReplaceImport() {
    const result = await Swal.fire({
        icon: 'warning',
        title: 'แทนที่ตารางสอนทั้งหมด?',
        html: `<div class="text-start small">
            <p>การดำเนินการนี้จะ <strong class="text-danger">ลบข้อมูลตารางสอนทั้งหมด</strong> ออกจากระบบก่อน แล้วนำเข้าข้อมูลจากไฟล์ที่เลือก</p>
            <p class="mb-0 text-muted">เหมาะสำหรับการอัปเดตตารางสอนใหม่ทั้งภาคเรียน</p>
        </div>`,
        showCancelButton: true,
        confirmButtonText: 'ยืนยัน นำเข้าแบบแทนที่',
        cancelButtonText: 'ยกเลิก',
        confirmButtonColor: '#dc3545',
    });
    if (!result.isConfirmed) return;
    window.__importReplaceAll = true;
    openImport();
}

async function loadTeachers() {
    try {
        const res  = await fetch('../api/get_teachers_list.php');
        const data = await res.json();
        const list = data.teachers || data.data || [];
        const opts = list.map(t =>
            `<option value="${t.teachers_id || t.id}">${t.name}</option>`
        ).join('');
        document.getElementById('filterTeacher').innerHTML = '<option value="">— ครูทุกคน —</option>' + opts;
        document.getElementById('fTeacher').innerHTML = '<option value="">— เลือกครู —</option>' + opts;
    } catch(e) { console.warn(e); }
}

async function loadData() {
    const params = new URLSearchParams();
    const t = document.getElementById('filterTeacher').value;
    const d = document.getElementById('filterDay').value;
    const cr = document.getElementById('filterClassroom').value;

    if (t) params.set('teacher_id', t);
    if (d) params.set('day', d);
    
    if (cr) {
        // System 3-digit: e.g. 101 -> Grade ม.1, Class 101
        const gradeNum = cr.charAt(0);
        params.set('grade_level', 'ม.' + gradeNum);
        params.set('class_name', cr);
    }

    const res  = await fetch('../api/admin/timetable.php?' + params.toString());
    const json = await res.json();
    if (!json.success) { document.getElementById('listContainer').innerHTML = '<p class="text-danger text-center py-4">เกิดข้อผิดพลาด</p>'; return; }

    const data = json.data || [];
    document.getElementById('countLabel').textContent = data.length + ' รายการ';
    document.getElementById('statTotal').textContent    = data.length;
    document.getElementById('statTeachers').textContent = new Set(data.map(r => r.teacher_id)).size;
    document.getElementById('statClasses').textContent  = new Set(data.filter(r => r.class_name).map(r => r.class_name)).size;
    document.getElementById('statSubjects').textContent = new Set(data.map(r => r.subject_name)).size;

    if (!data.length) {
        document.getElementById('listContainer').innerHTML = `<div class="text-center py-5 text-muted">
            <i class="bi bi-inbox display-3 opacity-25 d-block mb-3"></i>ไม่พบข้อมูลตารางสอน</div>`;
        return;
    }

    let html = '';
    data.forEach(r => {
        html += `
        <div class="tt-row-card">
            <div class="period-dot" style="background:${P_COLORS[r.period] || '#64748b'};">${r.period}</div>
            <div class="flex-fill min-w-0">
                <div class="fw-bold" style="font-size:.92rem;">${r.subject_name}${r.subject_code ? ` <span class="text-muted fw-normal small">(${r.subject_code})</span>` : ''}</div>
                <div class="d-flex flex-wrap gap-2 mt-1">
                    <span class="day-badge">${DAYS[r.day_of_week] || ''}</span>
                    ${r.grade_level ? `<span class="badge bg-light text-dark border">${r.grade_level}${r.class_name ? '/' + r.class_name : ''}</span>` : ''}
                    ${r.room_location ? `<span class="badge bg-light text-dark border"><i class="bi bi-geo-alt me-1"></i>${r.room_location}</span>` : ''}
                </div>
                <div class="text-muted small mt-1"><i class="bi bi-person me-1"></i>${r.teacher_name?.trim() || '—'}</div>
            </div>
            <div class="d-flex gap-1">
                <button class="btn btn-sm btn-light rounded-3" onclick="editRecord(${r.id})"><i class="bi bi-pencil"></i></button>
                <button class="btn btn-sm btn-danger rounded-3 opacity-75" onclick="deleteRecord(${r.id}, '${r.subject_name.replace(/'/g,"\\'")}')"><i class="bi bi-trash3"></i></button>
            </div>
        </div>`;
    });
    document.getElementById('listContainer').innerHTML = html;
}

function clearFilters() {
    ['filterTeacher', 'filterDay', 'filterClassroom'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = '';
    });
    loadData();
}

function openAddModal() {
    document.getElementById('modalTitle').textContent = 'เพิ่มคาบสอน';
    document.getElementById('editId').value = '';
    ['fTeacher','fDay','fGrade','fSem'].forEach(id => document.getElementById(id).value = '');
    ['fPeriod','fSubject','fCode','fClass','fRoom','fYear','fNote'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('fPeriod').value = '0';
    document.getElementById('fSem').value = '1';
    ttModal.show();
}

async function editRecord(id) {
    const res  = await fetch(`../api/admin/timetable.php?id=${id}`);
    const json = await res.json();
    if (!json.success || !json.data) return;
    const r = json.data;
    document.getElementById('modalTitle').textContent = 'แก้ไขคาบสอน';
    document.getElementById('editId').value    = r.id;
    document.getElementById('fTeacher').value  = r.teacher_id;
    document.getElementById('fDay').value      = r.day_of_week;
    document.getElementById('fPeriod').value   = r.period;
    document.getElementById('fSubject').value  = r.subject_name;
    document.getElementById('fCode').value     = r.subject_code || '';
    document.getElementById('fGrade').value    = r.grade_level || '';
    document.getElementById('fClass').value    = r.class_name  || '';
    document.getElementById('fRoom').value     = r.room_location || '';
    document.getElementById('fYear').value     = r.academic_year || '';
    document.getElementById('fSem').value      = r.semester || 1;
    document.getElementById('fNote').value     = r.note || '';
    ttModal.show();
}

async function saveRecord() {
    const id = document.getElementById('editId').value;
    const body = {
        id:            id ? parseInt(id) : undefined,
        teacher_id:    document.getElementById('fTeacher').value,
        day_of_week:   document.getElementById('fDay').value,
        period:        document.getElementById('fPeriod').value,
        subject_name:  document.getElementById('fSubject').value.trim(),
        subject_code:  document.getElementById('fCode').value.trim(),
        grade_level:   document.getElementById('fGrade').value,
        class_name:    document.getElementById('fClass').value.trim(),
        room_location: document.getElementById('fRoom').value.trim(),
        academic_year: document.getElementById('fYear').value.trim(),
        semester:      document.getElementById('fSem').value,
        note:          document.getElementById('fNote').value.trim(),
    };
    if (!body.teacher_id || !body.day_of_week || !body.subject_name) {
        alert('กรุณากรอกข้อมูลที่จำเป็น: ครู วัน และชื่อวิชา');
        return;
    }
    const method = id ? 'PUT' : 'POST';
    const res  = await fetch('../api/admin/timetable.php', {
        method, headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)
    });
    const json = await res.json();
    if (json.success) {
        ttModal.hide();
        loadData();
    } else {
        alert('ผิดพลาด: ' + (json.error || 'ไม่สามารถบันทึกได้'));
    }
}

async function deleteRecord(id, name) {
    if (!confirm(`ลบคาบสอน "${name}" ใช่หรือไม่?`)) return;
    const res  = await fetch(`../api/admin/timetable.php?id=${id}`, { method:'DELETE' });
    const json = await res.json();
    if (json.success) loadData();
    else alert('ลบไม่สำเร็จ');
}
</script>
</body>
</html>
