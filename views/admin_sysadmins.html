<!DOCTYPE html>
<html lang="th">
<head>
	<meta charset="UTF-8" />
	<title>จัดการข้อมูลผู้ดูแลระบบ | CNP APP</title>
	<meta content='width=device-width, initial-scale=1.0, shrink-to-fit=no' name='viewport' />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="../public/css/style.css">    <style>
        .btn-navy { background-color: #1f355c; color: white; border: none; }
        .btn-navy:hover { background-color: #162643; color: white; }
        .table-custom-header th { background-color: #1f355c !important; color: white !important; font-weight: 500; }
        .badge-outline { background: transparent; padding: 5px 12px; font-size: 0.75rem;}
        .table > :not(caption) > * > * { padding: 1rem 1rem; border-bottom-color: #f1f3f5;}
        
        .search-area {
            background-color: #fafbfc;
            border: 1px solid #e9ecef;
            border-radius: 12px;
            padding: 20px;
        }
        .form-control-custom {
            border-radius: 50px;
            padding-left: 40px;
            height: 42px;
            background-color: #ffffff;
        }
        .search-icon-inside {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #adb5bd;
        }
    </style>
</head>
<body class="bg-light">
	<div class="wrapper">
		<div class="sidebar" id="mainSidebar">
			<!-- Injected by main.js -->
		</div>

		<main class="app-main main-panel d-flex flex-column min-vh-100 d-flex flex-column min-vh-100" style="background-color: #f8fafc;" id="main" tabindex="-1">
			<div class="app-content-header main-header sticky-top bg-white border-bottom">
				<div class="container-fluid d-flex align-items-center justify-content-between py-3 px-4">
                    <button class="btn btn-link text-navy d-lg-none px-0" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
                    <!-- Blank div to push breadcrumbs to right -->
                    <div class="d-flex align-items-center gap-3">
                        <button class="btn btn-link text-navy d-lg-none px-0" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
                        <nav aria-label="breadcrumb">
                            <ol class="breadcrumb breadcrumb-modern mb-0 small">
                                <li class="breadcrumb-item"><a href="admin_dashboard.html">หน้าหลัก</a></li>
                                <li class="breadcrumb-item active">จัดการผู้ดูแลระบบ</li>
                            </ol>
                        </nav>
                    </div>
				</div>
			</div>

			<div class="app-content page-content py-4 flex-grow-1 d-flex flex-column py-4 flex-grow-1 d-flex flex-column">
                        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4">
                            <div>
                                <h4 class="fw-bold text-navy mb-1">จัดการผู้ดูแลระบบ</h4>
                                <p class="text-muted small mb-0">ดูแลสิทธิ์การเข้าใช้งานและข้อมูลพื้นฐานของเจ้าหน้าที่ดูแลระบบ</p>
                            </div>
                            <button class="btn btn-primary rounded-pill px-4 fw-bold shadow-sm hover-scale" onclick="addAdmin()">
                                <i class="bi bi-person-plus-fill me-2"></i> เพิ่มผู้ดูแล
                            </button>
                        </div>

                        <!-- Data Table Card -->
                        <div class="card border-0 mb-4 bg-transparent shadow-none">
                            <div class="card-header border-bottom-0 py-3 px-4" style="background: #2b4b8a; border-radius: 12px 12px 0 0;">
                                <h5 class="fw-bold text-white mb-0"><i class="bi bi-shield-lock me-2"></i> รายชื่อผู้ดูแลระบบ</h5>
                            </div>
                            <div class="card-body p-0">
                                <div class="table-responsive">
                                    <table class="table align-middle mb-0 table-modern">
                                        <thead class="sticky-top">
                                            <tr>
                                                <th style="width: 5%;" class="text-center py-3 text-secondary small fw-bold text-uppercase">#</th>
                                                <th style="width: 40%;" class="py-3 text-secondary small fw-bold text-uppercase">ผู้ดูแลระบบ</th>
                                                <th style="width: 20%;" class="py-3 text-secondary small fw-bold text-uppercase">อีเมล/การติดต่อ</th>
                                                <th style="width: 20%;" class="py-3 text-secondary small fw-bold text-uppercase">ระดับสิทธิ์</th>
                                                <th style="width: 15%;" class="text-center py-3 text-secondary small fw-bold text-uppercase">จัดการ</th>
                                            </tr>
                                        </thead>
                                        <tbody id="adminTableBody">
                                            <tr>
                                                <td colspan="5" class="text-center py-4 text-muted">กำลังโหลดข้อมูล...</td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>

                        <!-- Footer Info -->
                        <div class="d-flex justify-content-between align-items-center px-2">
                            <small class="text-muted" id="countSummary">กำลังโหลด...</small>
                        </div>
			</div>
		</div>
	</div><script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../public/js/main.js"></script>
    <script>
        let currentUserId = null;

        document.addEventListener('DOMContentLoaded', async () => {
            const user = await checkAuth('admin');
            if (user) {
                currentUserId = user.id;
                loadAdmins();
            }
        });

        async function loadAdmins() {
            try {
                const res = await fetch('../api/admin/sysadmins.php?_t=' + Date.now());
                const data = await res.json();
                if (data.success) {
                    const admins = data.data || [];
                    const tbody = document.getElementById('adminTableBody');
                    const countSummary = document.getElementById('countSummary');
                    
                    if (countSummary) {
                        countSummary.textContent = `แสดง 1 ถึง ${admins.length} จาก ${admins.length} รายการ`;
                    }
                    
                    if (admins.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="5" class="text-center py-4 text-muted">ไม่พบข้อมูลผู้ดูแลระบบ</td></tr>';
                        return;
                    }
                    
                    tbody.innerHTML = admins.map((admin, idx) => {
                        const name = (admin.first_name_th || admin.last_name_th) 
                            ? `${admin.first_name_th || ''} ${admin.last_name_th || ''}`.trim() 
                            : admin.username;
                        const isSelf = parseInt(admin.user_id) === parseInt(currentUserId);
                        const initials = (admin.first_name_th ? admin.first_name_th.substring(0, 2) : 'AD').toUpperCase();
                        
                        let photoHtml = `<div class="avatar-sm bg-primary-subtle text-primary rounded-circle d-flex align-items-center justify-content-center fw-bold shadow-sm" style="width: 40px; height: 40px;">${initials}</div>`;
                        if (admin.photo) {
                            photoHtml = `<img src="../${admin.photo}" class="rounded-circle shadow-sm" style="width: 40px; height: 40px; object-fit: cover;" onerror="this.outerHTML='${photoHtml}'">`;
                        }

                        const selfBadge = isSelf ? ' <span class="badge bg-navy ms-1" style="font-size: 0.65rem;">บัญชีของคุณ</span>' : '';
                        
                        return `
                            <tr class="hover-bg-light transition-all">
                                <td class="text-center fw-bold text-muted">${idx + 1}</td>
                                <td>
                                    <div class="d-flex align-items-center gap-3">
                                        \${photoHtml}
                                        <div>
                                            <span class="fw-bold text-dark d-block">\${name}\${selfBadge}</span>
                                            <span class="badge bg-success-subtle text-success border border-success-subtle rounded-pill" style="font-size: 0.7rem;">
                                                <i class="bi bi-check-circle-fill me-1"></i> ผู้ใช้งานระบบ
                                            </span>
                                        </div>
                                    </div>
                                </td>
                                <td>
                                    <div class="small">
                                        <i class="bi bi-envelope me-1 text-muted"></i> \${admin.username}
                                    </div>
                                </td>
                                <td>
                                    <span class="badge bg-danger-subtle text-danger border border-danger-subtle rounded-pill px-3">
                                        <i class="bi bi-award me-1"></i> \${admin.position || 'ผู้ดูแลระบบ'}
                                    </span>
                                </td>
                                <td class="text-center">
                                    <div class="btn-group shadow-sm">
                                        <button class="btn btn-danger btn-sm text-white hover-scale \${isSelf ? 'disabled opacity-50' : ''}" 
                                                title="\${isSelf ? 'ไม่สามารถลบบัญชีตัวเองได้' : 'ลบ'}" 
                                                onclick="deleteAdmin(\${admin.user_id})" \${isSelf ? 'disabled' : ''}>
                                            <i class="bi bi-trash-fill"></i>
                                        </button>
                                    </div>
                                </td>
                            </tr>
                        `;
                    }).join('');
                } else {
                    Swal.fire('ผิดพลาด', data.error || 'ไม่สามารถดึงข้อมูลผู้ดูแลระบบได้', 'error');
                }
            } catch (e) {
                console.error(e);
                Swal.fire('ผิดพลาด', 'ระบบขัดข้องชั่วคราว', 'error');
            }
        }

        async function addAdmin() {
            const { value: formValues } = await Swal.fire({
                title: 'เพิ่มผู้ดูแลระบบใหม่',
                html:
                    '<div class="text-start mb-3">' +
                    '  <label class="form-label fw-bold small text-navy">Username / อีเมลโรงเรียน</label>' +
                    '  <input id="swal-username" class="form-control rounded-pill" placeholder="username@chainatpit.ac.th">' +
                    '</div>' +
                    '<div class="text-start mb-3">' +
                    '  <label class="form-label fw-bold small text-navy">รหัสผ่านเริ่มต้น</label>' +
                    '  <input id="swal-password" type="password" class="form-control rounded-pill" value="cnp12345">' +
                    '</div>' +
                    '<div class="row g-2 mb-3">' +
                    '  <div class="col-6 text-start">' +
                    '    <label class="form-label fw-bold small text-navy">ชื่อจริง (ภาษาไทย)</label>' +
                    '    <input id="swal-first" class="form-control rounded-pill" placeholder="เช่น นัชนันท์">' +
                    '  </div>' +
                    '  <div class="col-6 text-start">' +
                    '    <label class="form-label fw-bold small text-navy">นามสกุล (ภาษาไทย)</label>' +
                    '    <input id="swal-last" class="form-control rounded-pill" placeholder="เช่น นครคง">' +
                    '  </div>' +
                    '</div>' +
                    '<div class="text-start mb-2">' +
                    '  <label class="form-label fw-bold small text-navy">ตำแหน่ง</label>' +
                    '  <input id="swal-position" class="form-control rounded-pill" value="ผู้ดูแลระบบ">' +
                    '</div>',
                focusConfirm: false,
                showCancelButton: true,
                confirmButtonText: 'บันทึก',
                cancelButtonText: 'ยกเลิก',
                confirmButtonColor: '#1f355c',
                preConfirm: () => {
                    const username = document.getElementById('swal-username').value.trim();
                    const password = document.getElementById('swal-password').value;
                    const first_name_th = document.getElementById('swal-first').value.trim();
                    const last_name_th = document.getElementById('swal-last').value.trim();
                    const position = document.getElementById('swal-position').value.trim();

                    if (!username || !first_name_th) {
                        Swal.showValidationMessage('กรุณาระบุ Username และชื่อจริง');
                        return false;
                    }
                    if (!username.toLowerCase().endsWith('@chainatpit.ac.th')) {
                        Swal.showValidationMessage('อีเมลต้องเป็น @chainatpit.ac.th เท่านั้น');
                        return false;
                    }

                    return { username, password, first_name_th, last_name_th, position };
                }
            });

            if (formValues) {
                try {
                    Swal.fire({ title: 'กำลังบันทึก...', didOpen: () => Swal.showLoading(), allowOutsideClick: false });
                    const res = await fetch('../api/admin/sysadmins.php', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(formValues)
                    });
                    const data = await res.json();
                    if (data.success) {
                        Swal.fire('สำเร็จ', data.message, 'success');
                        loadAdmins();
                    } else {
                        Swal.fire('ผิดพลาด', data.error || 'ไม่สามารถเพิ่มผู้ดูแลระบบได้', 'error');
                    }
                } catch (e) {
                    Swal.fire('ผิดพลาด', 'ระบบขัดข้องชั่วคราว', 'error');
                }
            }
        }

        async function deleteAdmin(userId) {
            const confirm = await Swal.fire({
                title: 'ยืนยันการลบผู้ดูแลระบบ?',
                text: "การลบผู้ดูแลระบบจะยกเลิกสิทธิ์และข้อมูลบัญชีทั้งหมด และไม่สามารถย้อนคืนได้!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonText: 'ยืนยัน ลบข้อมูล',
                cancelButtonText: 'ยกเลิก',
                confirmButtonColor: '#ef4444'
            });

            if (!confirm.isConfirmed) return;

            try {
                Swal.fire({ title: 'กำลังลบ...', didOpen: () => Swal.showLoading(), allowOutsideClick: false });
                const res = await fetch(`../api/admin/sysadmins.php?id=${userId}`, { method: 'DELETE' });
                const data = await res.json();
                if (data.success) {
                    Swal.fire({ icon: 'success', title: 'ลบผู้ดูแลระบบสำเร็จ', timer: 1500, showConfirmButton: false });
                    loadAdmins();
                } else {
                    Swal.fire('ผิดพลาด', data.error || 'ไม่สามารถลบผู้ดูแลระบบได้', 'error');
                }
            } catch (e) {
                Swal.fire('ผิดพลาด', 'ระบบขัดข้องชั่วคราว', 'error');
            }
        }
    </script>
</body>
</html>
