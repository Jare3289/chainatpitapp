<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8" />
    <title>บันทึกสาธารณประโยชน์ | CNP APP</title>
    <meta content='width=device-width, initial-scale=1.0, shrink-to-fit=no' name='viewport' />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css" />
    <link rel="stylesheet" href="../public/css/style.css">
    <style>
        body { font-family: 'Google Sans', 'Sarabun', sans-serif; background-color: #f8fafc; }
        .page-header { background: white; padding: 25px 30px; border-radius: 0 0 35px 35px; box-shadow: 0 10px 30px rgba(0,0,0,0.02); margin-bottom: 30px; }
        
        .stat-card { background: white; border-radius: 24px; padding: 25px; border: 1px solid rgba(0,0,0,0.02); height: 100%; transition: 0.3s; }
        .stat-card:hover { transform: translateY(-5px); box-shadow: 0 15px 35px rgba(0,0,0,0.05); }
        
        .activity-item { 
            background: white; border-radius: 18px; padding: 15px; border: 1px solid rgba(0,0,0,0.05); 
            margin-bottom: 12px; transition: all 0.2s ease; cursor: pointer;
        }
        .activity-item:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(30, 58, 138, 0.08); border-color: #3b82f6; }
        .activity-item:active { transform: scale(0.98); }
        
        .status-pill { font-weight: 700; font-size: 0.7rem; padding: 6px 14px; border-radius: 50px; text-transform: uppercase; letter-spacing: 0.5px; }
        .status-approved { background: #dcfce7; color: #15803d; border: 1px solid #bcf1cf; }
        .status-pending { background: #fef9c3; color: #a16207; border: 1px solid #fcf2a8; }
        .status-rejected { background: #fee2e2; color: #b91c1c; border: 1px solid #fecaca; }

        /* Modern Form Styles */
        .form-label-premium { font-size: 0.8rem; font-weight: 700; color: #64748b; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
        .form-control-premium { background-color: #f1f5f9; border: 2px solid transparent; border-radius: 16px; padding: 14px 18px; font-weight: 500; transition: 0.2s; }
        .form-control-premium:focus { background-color: #fff; border-color: #3b82f6; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); outline: none; }
        
        /* Choices.js Overrides */
        .choices__inner { background-color: #f1f5f9 !important; border: 2px solid transparent !important; border-radius: 16px !important; min-height: 54px !important; display: flex; align-items: center; }
        .choices.is-focused .choices__inner { background-color: #fff !important; border-color: #3b82f6 !important; }
        .choices__list--single { font-weight: 600; padding-left: 8px !important; }
        .choices__list--dropdown { border-radius: 18px !important; border: none !important; box-shadow: 0 15px 40px rgba(0,0,0,0.15) !important; margin-top: 8px !important; overflow: hidden !important; z-index: 3000 !important; }
        .choices__item--selectable.is-highlighted { background-color: #3b82f6 !important; }

        .btn-premium { border-radius: 18px; padding: 14px 28px; font-weight: 700; transition: 0.3s; }
        .btn-premium-primary { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); color: white; border: none; box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2); }
        .btn-premium:hover { transform: translateY(-2px); box-shadow: 0 12px 25px rgba(37, 99, 235, 0.3); }
        
        /* Cool CRUD Buttons */
        .btn-icon { width: 36px; height: 36px; padding: 0; display: inline-flex; align-items: center; justify-content: center; transition: all 0.2s ease; }
        .btn-icon:hover { transform: translateY(-2px); }
        .btn-light-primary { background: #eff6ff; color: #3b82f6; }
        .btn-light-primary:hover { background: #3b82f6; color: white; box-shadow: 0 4px 12px rgba(59,130,246,0.3) !important; }
        .btn-light-primary:hover i { color: white !important; }
        .btn-light-danger { background: #fef2f2; color: #ef4444; }
        .btn-light-danger:hover { background: #ef4444; color: white; box-shadow: 0 4px 12px rgba(239,68,68,0.3) !important; }
        .btn-light-danger:hover i { color: white !important; }
        .btn-light-info { background: #f0fdfa; color: #0d9488; }
        .btn-light-info:hover { background: #0d9488; color: white; box-shadow: 0 4px 12px rgba(13,148,136,0.3) !important; }
        .btn-light-info:hover i { color: white !important; }
        
        .fw-black { font-weight: 900; }
        
        /* Responsive Mobile Table */
        @media (max-width: 768px) {
            .mobile-table thead { display: none; }
            .mobile-table tbody { display: block; border: none; }
            .mobile-table tr { 
                display: block; 
                margin-bottom: 16px; 
                border: 1px solid rgba(0,0,0,0.05); 
                border-radius: 16px; 
                padding: 12px 16px; 
                background: #fff;
                box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            }
            .mobile-table td { 
                display: flex; 
                justify-content: space-between; 
                align-items: center; 
                padding: 8px 0 !important; 
                border: none !important;
                border-bottom: 1px dashed #e2e8f0 !important; 
                text-align: right !important; 
            }
            .mobile-table td:last-child { 
                border-bottom: none !important; 
                justify-content: flex-end; 
                gap: 8px; 
                margin-top: 10px; 
                padding-bottom: 0 !important; 
            }
            .mobile-table td::before { 
                content: attr(data-label); 
                font-weight: 700; 
                color: #64748b; 
                font-size: 0.85rem; 
                text-align: left; 
            }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="sidebar" id="mainSidebar"></div>

        <main class="main-panel d-flex flex-column min-vh-100" id="main" tabindex="-1">
            <div class="app-content page-content flex-grow-1 py-4">
                
                <!-- HEADER SECTION -->
                <div class="px-4 mb-4">
                    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">
                        <div>
                            <h4 class="fw-black text-navy mb-1" style="letter-spacing: -0.5px;">บันทึกกิจกรรมสาธารณประโยชน์</h4>
                            <nav aria-label="breadcrumb">
                                <ol class="breadcrumb mb-0 small opacity-75">
                                    <li class="breadcrumb-item"><a href="student_dashboard.html" class="text-decoration-none text-primary">หน้าแรก</a></li>
                                    <li class="breadcrumb-item active">ประวัติกิจกรรม</li>
                                </ol>
                            </nav>
                        </div>
                        <div class="d-flex gap-2">
                            <a href="student_public_service_print.html" class="btn btn-premium btn-light border fw-bold text-navy shadow-sm" style="background: #ffffff;">
                                <i class="bi bi-printer-fill me-2"></i> พิมพ์รายงาน
                            </a>
                            <button class="btn btn-premium btn-premium-primary" onclick="showRequestModal()">
                                <i class="bi bi-plus-circle-fill me-2"></i> บันทึกกิจกรรมใหม่
                            </button>
                        </div>
                    </div>
                </div>

                <div class="container-fluid px-4">
                    
                    <!-- STATS SUMMARY -->
                    <div class="row g-4 mb-4">
                        <div class="col-md-8">
                            <div class="stat-card">
                                <div class="d-flex justify-content-between align-items-center mb-3">
                                    <h6 class="fw-bold text-navy mb-0">ความก้าวหน้าในภาคเรียนนี้</h6>
                                    <span class="badge bg-primary bg-opacity-10 text-primary rounded-pill px-3" id="progress-percent">0%</span>
                                </div>
                                <div class="progress rounded-pill mb-3" style="height: 12px; background: #f1f5f9;">
                                    <div id="progress-bar" class="progress-bar bg-primary" role="progressbar" style="width: 0%"></div>
                                </div>
                                <div class="d-flex justify-content-between small fw-bold">
                                    <span class="text-muted">ทำสำเร็จไปแล้ว <span class="text-primary fs-5" id="progress-count">0</span> ครั้ง</span>
                                    <span class="text-muted">เป้าหมาย 20 ครั้ง</span>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="stat-card text-center d-flex flex-column justify-content-center">
                                <div class="small text-muted mb-1 fw-bold">สถานะรอการรับรอง</div>
                                <div class="display-6 fw-black text-warning" id="pending-count">0</div>
                                <div class="small text-muted">กิจกรรม</div>
                            </div>
                        </div>
                    </div>

                    <!-- ACTIVITY FEED -->
                    <div class="d-flex align-items-center justify-content-between mb-3">
                        <h5 class="fw-black text-navy mb-0">กิจกรรมล่าสุดของฉัน</h5>
                        <div class="btn-group">
                            <button class="btn btn-sm btn-light border rounded-pill px-3 active" onclick="filterActivities('all', this)">ทั้งหมด</button>
                            <button class="btn btn-sm btn-light border rounded-pill px-3 ms-2" onclick="filterActivities('approved', this)">รับรองแล้ว</button>
                        </div>
                    </div>

                    <div id="activity-list">
                        <div class="text-center py-5">
                            <div class="spinner-border text-primary" role="status"></div>
                        </div>
                    </div>

                </div>
            </div>
            <footer id="footer-container"></footer>
        </main>
    </div>

    <!-- DETAIL MODAL -->
    <div class="modal fade" id="detailModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 24px;">
                <div class="modal-header border-0 p-4 pb-0">
                    <h5 class="fw-black text-navy mb-0">รายละเอียดกิจกรรม</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4" id="detailBody">
                    <!-- Dynamic Content -->
                </div>
                <div class="modal-footer border-0 p-4 pt-0">
                    <button type="button" class="btn btn-light rounded-pill w-100 fw-bold" data-bs-dismiss="modal">ปิดหน้าต่าง</button>
                </div>
            </div>
        </div>
    </div>

    <!-- REFINED REQUEST MODAL -->
    <div class="modal fade" id="requestModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 30px; overflow: hidden;">
                <div class="modal-header border-0 p-4 pb-0 bg-white">
                    <div>
                        <h5 class="fw-black text-navy mb-1"><i class="bi bi-stars text-warning me-2"></i>บันทึกกิจกรรมสาธารณประโยชน์</h5>
                        <p class="text-muted small mb-0">บันทึกกิจกรรมดีๆ ที่คุณได้ทำเพื่อรับการรับรองจากคุณครู</p>
                    </div>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4 bg-white">
                    <form id="requestForm" class="row g-4">
                        <div class="col-md-7">
                            <input type="hidden" name="id" id="req-id">
                            <div class="mb-3">
                                <label class="form-label-premium"><i class="bi bi-bookmark-star-fill text-primary"></i> ชื่อกิจกรรมสาธารณประโยชน์</label>
                                <input type="text" name="activity_name" class="form-control-premium w-100" placeholder="เช่น ช่วยเก็บขยะบริเวณโรงอาหาร" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label-premium"><i class="bi bi-geo-alt-fill text-danger"></i> สถานที่ปฏิบัติกิจกรรม</label>
                                <input type="text" name="location" class="form-control-premium w-100" placeholder="ระบุอาคารหรือห้อง" required>
                            </div>
                        </div>
                        <div class="col-md-5">
                            <div class="mb-3">
                                <label class="form-label-premium"><i class="bi bi-calendar-check-fill text-success"></i> วันที่ปฏิบัติกิจกรรม</label>
                                <input type="date" name="activity_date" id="req-date" class="form-control-premium w-100" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label-premium"><i class="bi bi-person-check-fill text-info"></i> คุณครูผู้รับรอง</label>
                                <select name="certifier_id" id="teacher-select" class="form-select" required>
                                    <option value="">เลือกรายชื่อคุณครู...</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-12 mt-0">
                            <div class="mb-3">
                                <label class="form-label-premium"><i class="bi bi-chat-heart-fill text-rose"></i> ผลที่เกิดขึ้น / ความประทับใจ</label>
                                <textarea name="impact_benefit" class="form-control-premium w-100" style="height: 100px" placeholder="ช่วยให้โรงเรียนสะอาดขึ้น, ภาคภูมิใจที่ได้ช่วยเหลือผู้อื่น..."></textarea>
                            </div>
                        </div>
                        <div class="col-12 text-center mt-2">
                            <div class="d-flex gap-3">
                                <button type="button" class="btn btn-light btn-premium flex-grow-1" data-bs-dismiss="modal">ยกเลิก</button>
                                <button type="submit" class="btn btn-premium btn-premium-primary flex-grow-1" id="submitBtn">
                                    <i class="bi bi-send-fill me-2"></i> บันทึกข้อมูลและส่งขอการรับรอง
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>
    <script src="../public/js/main.js"></script>
    <script>
        let teacherChoices;
        let allRecords = [];

        document.addEventListener('DOMContentLoaded', async () => {
            const user = await checkAuth(['student', 'teacher']);
            if (!user) return;
            if (user.role === 'teacher') {
                window.location.href = 'admin_public_service.html';
                return;
            }
            
            // Init Choices.js
            const teacherSelect = document.getElementById('teacher-select');
            teacherChoices = new Choices(teacherSelect, {
                searchEnabled: true,
                itemSelectText: '',
                noResultsText: 'ไม่พบรายชื่อครู',
                placeholder: true,
                placeholderValue: 'พิมพ์ชื่อครูเพื่อค้นหา...',
                shouldSort: false
            });

            loadTeachers();
            loadMyActivities();
            document.getElementById('requestForm').onsubmit = handleSubmit;
        });

        async function loadTeachers() {
            try {
                const res = await fetch('../api/get_teachers_list.php');
                const data = await res.json();
                if(data.success) {
                    const teachers = data.teachers.map(t => ({
                        value: t.id,
                        label: t.name
                    }));
                    teacherChoices.setChoices(teachers, 'value', 'label', true);
                }
            } catch (e) { console.error('Teachers load failed', e); }
        }

        async function loadMyActivities() {
            try {
                const res = await fetch('../api/public_service.php');
                const data = await res.json();
                if (data.success) {
                    allRecords = data.records;
                    const approved = allRecords.filter(r => r.status === 'approved').length;
                    const pending = allRecords.filter(r => r.status === 'pending').length;
                    
                    document.getElementById('pending-count').innerText = pending;
                    updateProgress(approved);
                    renderList(allRecords);
                }
            } catch (e) { console.error(e); }
        }

        function updateProgress(count) {
            const target = 20;
            const percent = Math.min(100, (count / target) * 100);
            document.getElementById('progress-count').textContent = count;
            document.getElementById('progress-bar').style.width = percent + '%';
            document.getElementById('progress-percent').textContent = Math.round(percent) + '%';
        }

        function renderList(records) {
            const list = document.getElementById('activity-list');
            if (records.length === 0) {
                list.innerHTML = `<div class="text-center py-5 bg-white rounded-5 border border-dashed">
                    <i class="bi bi-emoji-smile display-4 d-block mb-3 opacity-25"></i>
                    <p class="text-muted">ยังไม่มีประวัติกิจกรรม เริ่มบันทึกกิจกรรมแรกของคุณเลย!</p>
                </div>`;
                return;
            }
            
            let html = `
            <div class="table-responsive bg-white rounded-4 shadow-sm border mb-4" style="border: none !important; background: transparent !important; box-shadow: none !important;">
                <table class="table table-hover align-middle mb-0 mobile-table">
                    <thead class="table-light">
                        <tr>
                            <th class="ps-4">วันที่</th>
                            <th>กิจกรรม</th>
                            <th>สถานที่</th>
                            <th>ผลที่ได้รับ</th>
                            <th>จำนวน</th>
                            <th>ผู้รับรอง</th>
                            <th>สถานะ</th>
                            <th class="text-end pe-4">จัดการ</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            html += records.map(r => {
                const s = r.status;
                const statusCls = s === 'approved' ? 'status-approved' : (s === 'rejected' ? 'status-rejected' : 'status-pending');
                const statusTxt = s === 'approved' ? 'อนุมัติแล้ว' : (s === 'rejected' ? 'ไม่ผ่าน' : 'รอรับรอง');
                const editBtn = s === 'pending' ? `
                    <button class="btn btn-icon btn-light-primary rounded-circle border-0 shadow-sm mx-1" onclick="editActivity(${r.id}, event)" title="แก้ไข">
                        <i class="bi bi-pencil-square text-primary"></i>
                    </button>
                    <button class="btn btn-icon btn-light-danger rounded-circle border-0 shadow-sm mx-1" onclick="deleteActivity(${r.id}, event)" title="ลบ">
                        <i class="bi bi-trash-fill text-danger"></i>
                    </button>
                ` : '';

                return `
                        <tr style="cursor: pointer;" onclick="showDetail(${r.id})">
                            <td data-label="วันที่" class="text-muted small ps-md-4"><i class="bi bi-calendar3 me-1"></i>${r.activity_date_th}</td>
                            <td data-label="กิจกรรม" class="fw-bold text-navy">${r.activity_name}</td>
                            <td data-label="สถานที่" class="small text-muted"><i class="bi bi-geo-alt-fill text-primary"></i> ${r.location}</td>
                            <td data-label="ผลที่ได้รับ" class="small text-muted text-truncate" style="max-width: 150px;">${r.impact_benefit || '-'}</td>
                            <td data-label="จำนวน"><span class="badge bg-light text-navy rounded-pill border">${parseFloat(r.duration) || 1} ครั้ง</span></td>
                            <td data-label="ผู้รับรอง"><span class="small text-muted"><i class="bi bi-person-badge text-info me-1"></i>${r.certifier_name || '-'}</span></td>
                            <td data-label="สถานะ"><span class="status-pill ${statusCls} py-1 px-2" style="font-size: 0.6rem;">${statusTxt}</span></td>
                            <td data-label="" class="text-end pe-md-4" onclick="event.stopPropagation()">
                                <div class="d-inline-flex">
                                    ${editBtn}
                                    <button class="btn btn-icon btn-light-info rounded-circle border-0 shadow-sm mx-1" onclick="showDetail(${r.id})" title="ดูรายละเอียด">
                                        <i class="bi bi-search text-info"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>
                `;
            }).join('');
            
            html += `
                    </tbody>
                </table>
            </div>`;
            list.innerHTML = html;
        }

        function editActivity(id, event) {
            if(event) event.stopPropagation();
            const r = allRecords.find(x => x.id == id);
            if (!r) return;
            
            const form = document.getElementById('requestForm');
            form.reset();
            document.getElementById('req-id').value = r.id;
            form.activity_name.value = r.activity_name;
            form.location.value = r.location;
            form.activity_date.value = r.activity_date;
            form.impact_benefit.value = r.impact_benefit || '';
            
            if (r.approver_id && teacherChoices) {
                teacherChoices.setChoiceByValue(r.approver_id.toString());
            } else if (r.certifier_id && teacherChoices) {
                teacherChoices.setChoiceByValue(r.certifier_id.toString());
            }
            
            document.getElementById('submitBtn').innerHTML = '<i class="bi bi-save-fill me-2"></i> บันทึกการแก้ไข';
            new bootstrap.Modal(document.getElementById('requestModal')).show();
        }

        async function deleteActivity(id, event) {
            if(event) event.stopPropagation();
            
            const result = await Swal.fire({
                title: 'ยืนยันการลบ',
                text: "คุณต้องการลบรายการนี้ใช่หรือไม่? (ไม่สามารถกู้คืนได้)",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                cancelButtonColor: '#6c757d',
                confirmButtonText: '<i class="bi bi-trash-fill me-1"></i> ใช่, ลบเลย',
                cancelButtonText: 'ยกเลิก',
                customClass: { popup: 'rounded-4' }
            });
            
            if (result.isConfirmed) {
                try {
                    const res = await fetch('../api/public_service.php?id=' + id, {
                        method: 'DELETE',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ id: id })
                    });
                    const data = await res.json();
                    if (data.success) {
                        Swal.fire({ icon: 'success', title: 'ลบสำเร็จ!', timer: 1500, showConfirmButton: false, customClass: { popup: 'rounded-4' } });
                        loadMyActivities();
                    } else {
                        Swal.fire('ผิดพลาด', data.error || 'ไม่สามารถลบได้', 'error');
                    }
                } catch (e) {
                    Swal.fire('ผิดพลาด', 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้', 'error');
                }
            }
        }

        function showDetail(id) {
            const r = allRecords.find(x => x.id == id);
            if (!r) return;

            const s = r.status;
            const statusCls = s === 'approved' ? 'status-approved' : (s === 'rejected' ? 'status-rejected' : 'status-pending');
            const statusTxt = s === 'approved' ? '✅ รับรองแล้ว' : (s === 'rejected' ? '❌ ไม่ผ่าน' : '⏳ รอการรับรอง');
            const teacherName = (r.approver_name || r.certifier_name || '').trim() || '-';

            document.getElementById('detailBody').innerHTML = `
                <div class="text-center mb-4">
                    <span class="status-pill ${statusCls} d-inline-block mb-2">${statusTxt}</span>
                    <h5 class="fw-black text-navy">${r.activity_name}</h5>
                    <div class="small text-muted">${r.activity_date_th}</div>
                </div>
                <div class="row g-3">
                    <div class="col-6">
                        <div class="p-3 bg-light rounded-4">
                            <div class="small text-muted fw-bold mb-1">สถานที่</div>
                            <div class="text-navy fw-bold">${r.location || '-'}</div>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="p-3 bg-light rounded-4">
                            <div class="small text-muted fw-bold mb-1">จำนวนครั้ง</div>
                            <div class="text-navy fw-bold">${parseFloat(r.duration) || 1} ครั้ง</div>
                        </div>
                    </div>
                    <div class="col-12">
                        <div class="p-3 bg-light rounded-4">
                            <div class="small text-muted fw-bold mb-1">ผลที่เกิดขึ้น / ความประทับใจ</div>
                            <div class="text-navy" style="font-style: italic;">"${r.impact_benefit || 'ไม่มีข้อมูล'}"</div>
                        </div>
                    </div>
                    <div class="col-12">
                        <div class="p-3 border rounded-4 d-flex align-items-center gap-3">
                            <div class="bg-primary bg-opacity-10 p-2 rounded-circle">
                                <i class="bi bi-person-badge text-primary"></i>
                            </div>
                            <div>
                                <div class="small text-muted fw-bold">คุณครูผู้รับรอง</div>
                                <div class="text-navy fw-bold">${teacherName}</div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            new bootstrap.Modal(document.getElementById('detailModal')).show();
        }

        function filterActivities(status, btn) {
            document.querySelectorAll('.btn-group .btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if(status === 'all') renderList(allRecords);
            else renderList(allRecords.filter(r => r.status === status));
        }

        function showRequestModal() {
            document.getElementById('requestForm').reset();
            document.getElementById('req-id').value = '';
            document.getElementById('req-date').valueAsDate = new Date();
            document.getElementById('submitBtn').innerHTML = '<i class="bi bi-send-fill me-2"></i> บันทึกข้อมูลและส่งขอการรับรอง';
            if (teacherChoices) teacherChoices.removeActiveItems();
            new bootstrap.Modal(document.getElementById('requestModal')).show();
        }

        async function handleSubmit(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> กำลังบันทึก...';

            const fd = new FormData(e.target);
            const data = Object.fromEntries(fd.entries());
            
            // Choices.js select fix
            const select = document.getElementById('teacher-select');
            data.certifier_name = select.options[select.selectedIndex]?.text || '';
            
            const isEdit = !!data.id;
            if (isEdit) data.full_edit = true;
            const method = isEdit ? 'PUT' : 'POST';
            
            try {
                const res = await fetch('../api/public_service.php', {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const resData = await res.json();
                if (resData.success) {
                    Swal.fire({ icon: 'success', title: 'บันทึกสำเร็จ!', text: isEdit ? 'แก้ไขข้อมูลเรียบร้อยแล้ว' : 'ข้อมูลของคุณถูกส่งให้คุณครูตรวจสอบแล้ว', timer: 2000, showConfirmButton: false, customClass: { popup: 'rounded-4' } });
                    bootstrap.Modal.getInstance(document.getElementById('requestModal')).hide();
                    loadMyActivities();
                } else {
                    Swal.fire('ผิดพลาด', resData.message || resData.error || 'ไม่สามารถบันทึกได้', 'error');
                }
            } catch (e) { 
                Swal.fire('ผิดพลาด', 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้', 'error'); 
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        }
    </script>
</body>
</html>
