<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8" />
    <title>จัดการรายวิชา | CNP APP</title>
    <meta content='width=device-width, initial-scale=1.0, shrink-to-fit=no' name='viewport' />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Sarabun:wght@300;400;600;700&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../public/css/style.css">
    <style>
        body {
            font-family: 'Google Sans', 'Sarabun', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
        }

        .table-premium th {
            background: #f8fafc;
            padding: 15px 20px;
            font-weight: 700;
            color: #64748b;
            font-size: 0.8rem;
            border-bottom: 2px solid #eef2f6;
            white-space: nowrap;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .table-premium td {
            padding: 15px 20px;
            border-bottom: 1px solid #f1f5f9;
            vertical-align: middle;
            color: #334155;
        }

        .table-premium tr:hover td {
            background-color: #fcfdfe;
        }

        .subject-code-badge {
            background: #eff6ff;
            color: #1e3a8a;
            padding: 5px 12px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.85rem;
        }

        .dept-header {
            background: #f1f5f9;
            padding: 10px 20px;
            font-weight: 800;
            color: #475569;
            font-size: 0.9rem;
            border-left: 4px solid #1e3a8a;
        }

        .swal2-input,
        .swal2-select {
            font-family: 'Sarabun', sans-serif !important;
        }
    </style>
</head>

<body>
    <div class="wrapper">
        <div class="sidebar" id="mainSidebar"></div>

        <main class="main-panel d-flex flex-column min-vh-100" id="main">
            <div id="header-container"></div>

            <div class="app-content page-content flex-grow-1 py-4 position-relative">
                <div class="container-fluid">

                    <div
                        class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4">
                        <div>
                            <h4 class="fw-black text-navy mb-1" style="letter-spacing: -0.5px;">จัดการข้อมูลรายวิชา</h4>
                            <p class="text-muted small mb-0">เพิ่ม ลบ แก้ไข และอัปโหลดข้อมูลรายวิชาทั้งหมดในระบบ</p>
                        </div>
                        <div class="d-flex gap-2">
                            <button class="btn btn-navy-subtle rounded-pill px-4 fw-bold shadow-sm"
                                onclick="openUploadModal()">
                                <i class="bi bi-cloud-upload me-2"></i> อัปโหลดข้อมูล
                            </button>
                            <button class="btn btn-navy rounded-pill px-4 fw-bold shadow-sm" onclick="openAddModal()">
                                <i class="bi bi-plus-lg me-2"></i> เพิ่มรายวิชา
                            </button>
                        </div>
                    </div>

                    <div class="content-card mb-4 p-3 d-flex align-items-center gap-3">
                        <i class="bi bi-search text-muted ms-2"></i>
                        <input type="text" id="subjectSearch" class="form-control border-0 bg-transparent shadow-none"
                            placeholder="ค้นหารหัสวิชา, ชื่อวิชา หรือชื่อครู..." oninput="filterSubjects()">
                        <div class="vr opacity-25" style="height: 25px;"></div>
                        <select id="yearFilter"
                            class="form-select border-0 bg-transparent shadow-none fw-bold text-navy"
                            style="width: 150px;" onchange="loadSubjects()">
                            <option value="2569">ปีการศึกษา 2569</option>
                            <option value="2568">ปีการศึกษา 2568</option>
                        </select>
                        <select id="semesterFilter"
                            class="form-select border-0 bg-transparent shadow-none fw-bold text-navy"
                            style="width: 120px;" onchange="loadSubjects()">
                            <option value="1">เทอม 1</option>
                            <option value="2">เทอม 2</option>
                        </select>
                    </div>

                    <div class="content-card p-0 overflow-hidden shadow-sm">
                        <div class="table-responsive">
                            <table class="table-premium mb-0">
                                <thead>
                                    <tr>
                                        <th class="ps-4">รหัสวิชา</th>
                                        <th>ชื่อรายวิชา</th>
                                        <th>ห้องที่สอน</th>
                                        <th>ผู้สอน</th>
                                        <th class="text-end pe-4">จัดการ</th>
                                    </tr>
                                </thead>
                                <tbody id="subjectTableBody">
                                    <tr>
                                        <td colspan="5" class="text-center py-5">
                                            <div class="spinner-border text-primary opacity-25"></div>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>

                </div>
            </div>

            <footer id="globalFooter" class="app-footer text-center text-md-start mt-auto pb-4"></footer>
        </main>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../public/js/main.js"></script>
    <script src="../public/js/importModal.js"></script>
    <script>
        let allSubjects = [];
        let allTeachers = [];

        document.addEventListener('DOMContentLoaded', async () => {
            const user = await checkAuth('admin');
            if (user) {
                loadSubjects();
                loadTeachers();
            }
        });

        async function loadTeachers() {
            try {
                const res = await fetch('../api/admin/teachers.php');
                const data = await res.json();
                if (data.success) { allTeachers = data.teachers; }
            } catch (e) { console.error(e); }
        }

        function openUploadModal() {
            initImportModal({
                type: 'subject',
                apiUrl: '../api/admin/upload-subjects.php',
                templateBaseUrl: '../api/admin/download-template.php?type=subject',
                onSuccess: loadSubjects
            });
        }

        async function loadSubjects() {
            const tbody = document.getElementById('subjectTableBody');
            tbody.innerHTML = '<tr><td colspan="5" class="text-center py-5"><div class="spinner-border text-primary opacity-25"></div></td></tr>';

            const year = document.getElementById('yearFilter').value;
            const sem = document.getElementById('semesterFilter').value;

            try {
                const res = await fetch(`../api/admin/subjects.php?year=${year}&semester=${sem}`);
                const data = await res.json();
                if (data.success) {
                    allSubjects = data.subjects;
                    renderTable();
                }
            } catch (e) { console.error(e); }
        }

        let searchTimer;
        function filterSubjects() {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(() => {
                renderTable();
            }, 300);
        }

        function renderTable() {
            const tbody = document.getElementById('subjectTableBody');
            const search = document.getElementById('subjectSearch').value.toLowerCase();

            const filtered = allSubjects.filter(s =>
                s.subject_code.toLowerCase().includes(search) ||
                s.subject_name.toLowerCase().includes(search) ||
                (s.first_name_th && s.first_name_th.toLowerCase().includes(search)) ||
                (s.last_name_th && s.last_name_th.toLowerCase().includes(search)) ||
                (s.department && s.department.toLowerCase().includes(search))
            );

            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center py-5 text-muted">ไม่พบข้อมูลรายวิชา</td></tr>';
                return;
            }

            // Group by Department
            const grouped = filtered.reduce((acc, s) => {
                const dept = s.department || 'ไม่ระบุกลุ่มสาระ';
                if (!acc[dept]) acc[dept] = [];
                acc[dept].push(s);
                return acc;
            }, {});

            let html = '';
            Object.keys(grouped).sort().forEach(dept => {
                html += `<tr><td colspan="5" class="dept-header"><i class="bi bi-folder2-open me-2"></i>${dept}</td></tr>`;
                grouped[dept].forEach(s => {
                    const teacherName = s.first_name_th ? `${s.prefix || ''}${s.first_name_th} ${s.last_name_th}` : '<span class="text-danger small">ไม่พบครูในระบบ</span>';
                    const rooms = s.rooms ? s.rooms.split(',').map(r => `<span class="badge bg-light text-navy border me-1">${r}</span>`).join('') : (s.room ? s.room.split(',').map(r => `<span class="badge bg-light text-navy border me-1">${r}</span>`).join('') : '-');

                    html += `
                        <tr>
                            <td class="ps-4"><span class="subject-code-badge">${s.subject_code}</span></td>
                            <td class="fw-bold text-navy">${s.subject_name}</td>
                            <td>${rooms}</td>
                            <td class="small fw-bold">${teacherName}</td>
                            <td class="text-end pe-4">
                                <div class="btn-group shadow-none">
                                    <button class="btn btn-sm btn-light rounded-pill px-3 fw-bold border" onclick="editSubject(${s.id})">แก้ไข</button>
                                    <button class="btn btn-sm btn-light text-danger rounded-pill px-2 fw-bold border ms-1" onclick="deleteSubject(${s.id})"><i class="bi bi-trash"></i></button>
                                </div>
                            </td>
                        </tr>
                    `;
                });
            });
            tbody.innerHTML = html;
        }

        async function openAddModal() {
            const { value: formValues } = await Swal.fire({
                title: 'เพิ่มรายวิชาใหม่',
                html: generateSubjectForm(),
                focusConfirm: false,
                showCancelButton: true,
                confirmButtonText: 'บันทึก',
                cancelButtonText: 'ยกเลิก',
                width: '600px',
                preConfirm: () => {
                    return getSubjectFormData();
                }
            });

            if (formValues) {
                saveSubject(formValues);
            }
        }

        async function editSubject(id) {
            const subject = allSubjects.find(s => s.id == id);
            if (!subject) return;

            const { value: formValues } = await Swal.fire({
                title: 'แก้ไขข้อมูลรายวิชา',
                html: generateSubjectForm(subject),
                focusConfirm: false,
                showCancelButton: true,
                confirmButtonText: 'อัปเดต',
                cancelButtonText: 'ยกเลิก',
                width: '600px',
                preConfirm: () => {
                    return { ...getSubjectFormData(), id: id };
                }
            });

            if (formValues) {
                saveSubject(formValues, true);
            }
        }

        function generateSubjectForm(s = {}) {
            const teacherOpts = allTeachers.map(t =>
                `<option value="${t.user_id}" ${s.teacher_id == t.user_id ? 'selected' : ''}>${t.prefix}${t.first_name_th} ${t.last_name_th}</option>`
            ).join('');

            return `
                <div class="text-start p-2">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="small fw-bold text-muted mb-1">รหัสวิชา *</label>
                            <input id="swal-code" class="form-control" placeholder="เช่น ว23203" value="${s.subject_code || ''}">
                        </div>
                        <div class="col-md-6">
                            <label class="small fw-bold text-muted mb-1">ชื่อวิชา *</label>
                            <input id="swal-name" class="form-control" placeholder="ชื่อรายวิชา" value="${s.subject_name || ''}">
                        </div>
                        <div class="col-md-12">
                            <label class="small fw-bold text-muted mb-1">กลุ่มสาระการเรียนรู้</label>
                            <input id="swal-dept" class="form-control" placeholder="เช่น วิทยาศาสตร์และเทคโนโลยี" value="${s.department || ''}">
                        </div>
                        <div class="col-md-12">
                            <label class="small fw-bold text-muted mb-1">ครูผู้สอน</label>
                            <select id="swal-teacher" class="form-select">
                                <option value="">-- เลือกครูผู้สอน --</option>
                                ${teacherOpts}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="small fw-bold text-muted mb-1">ปีการศึกษา</label>
                            <input id="swal-year" class="form-control" placeholder="2569" value="${s.academic_year || document.getElementById('yearFilter').value}">
                        </div>
                        <div class="col-md-6">
                            <label class="small fw-bold text-muted mb-1">ภาคเรียน</label>
                            <input id="swal-sem" class="form-control" placeholder="1" value="${s.semester || document.getElementById('semesterFilter').value}">
                        </div>
                        <div class="col-md-12">
                            <label class="small fw-bold text-muted mb-1">ห้องที่สอน (คั่นด้วยคอมม่า ,)</label>
                            <input id="swal-rooms" class="form-control" placeholder="เช่น 310, 311" value="${s.rooms || s.room || ''}">
                        </div>
                    </div>
                </div>
            `;
        }

        function getSubjectFormData() {
            const code = document.getElementById('swal-code').value;
            const name = document.getElementById('swal-name').value;
            if (!code || !name) {
                Swal.showValidationMessage('กรุณากรอกรหัสและชื่อวิชา');
                return false;
            }
            return {
                subject_code: code,
                subject_name: name,
                department: document.getElementById('swal-dept').value,
                teacher_id: document.getElementById('swal-teacher').value || null,
                academic_year: document.getElementById('swal-year').value,
                semester: document.getElementById('swal-sem').value,
                room: document.getElementById('swal-rooms').value
            };
        }

        async function saveSubject(data, isUpdate = false) {
            try {
                const res = await fetch('../api/admin/subjects.php', {
                    method: isUpdate ? 'PUT' : 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                if (result.success) {
                    Swal.fire('สำเร็จ', result.message, 'success');
                    loadSubjects();
                } else {
                    Swal.fire('ผิดพลาด', result.error, 'error');
                }
            } catch (e) { console.error(e); }
        }

        async function deleteSubject(id) {
            const confirm = await Swal.fire({
                title: 'ยืนยันการลบ?',
                text: "ข้อมูลรายวิชานี้จะถูกลบออกจากระบบอย่างถาวร",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                confirmButtonText: 'ยืนยันการลบ',
                cancelButtonText: 'ยกเลิก'
            });
            if (confirm.isConfirmed) {
                const res = await fetch(`../api/admin/subjects.php?id=${id}`, {
                    method: 'DELETE'
                });
                const data = await res.json();
                if (data.success) {
                    Swal.fire('สำเร็จ', 'ลบข้อมูลรายวิชาเรียบร้อย', 'success');
                    loadSubjects();
                }
            }
        }
    </script>
</body>

</html>
