<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8" />
    <title>จัดการสาธารณประโยชน์ | CNP APP</title>
    <meta content='width=device-width, initial-scale=1.0, shrink-to-fit=no' name='viewport' />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css" />
    <link rel="stylesheet" href="../public/css/style.css">
    <style>
        body { font-family: 'Google Sans', 'Sarabun', sans-serif; background-color: #f8fafc; }
        .stat-card { background: white; border-radius: 24px; padding: 25px; border: 1px solid rgba(0,0,0,0.02); transition: 0.3s; }
        .stat-card:hover { transform: translateY(-5px); box-shadow: 0 15px 35px rgba(0,0,0,0.05); }
        .stat-icon { width: 54px; height: 54px; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; margin-bottom: 12px; }
        
        .record-card { 
            background: white; border-radius: 22px; border: 1px solid rgba(0,0,0,0.03); 
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); height: 100%;
            display: flex; flex-direction: column; overflow: hidden;
        }
        .record-card:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(0,0,0,0.08); border-color: #3b82f6; }
        .card-header-student { padding: 20px; background: #fcfdfe; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; gap: 12px; }
        .student-avatar { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; background: #f1f5f9; border: 2px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        
        .status-pill { font-weight: 700; font-size: 0.7rem; padding: 6px 14px; border-radius: 50px; text-transform: uppercase; }
        .status-approved { background: #dcfce7; color: #15803d; }
        .status-pending { background: #fef9c3; color: #a16207; }
        .status-rejected { background: #fee2e2; color: #b91c1c; }
        
        .btn-action { width: 38px; height: 38px; border-radius: 12px; display: flex; align-items: center; justify-content: center; border: none; transition: 0.2s; }
        .btn-edit { background: #eff6ff; color: #3b82f6; }
        .btn-edit:hover { background: #3b82f6; color: white; }
        .btn-approve { background: #f0fdf4; color: #10b981; }
        .btn-approve:hover { background: #10b981; color: white; }
        .btn-reject { background: #fff1f2; color: #f43f5e; }
        .btn-reject:hover { background: #f43f5e; color: white; }

        .choices__inner { background-color: #f1f5f9 !important; border: none !important; border-radius: 14px !important; min-height: 52px !important; display: flex; align-items: center; }
        .choices__list--dropdown { border-radius: 18px !important; border: none !important; box-shadow: 0 15px 40px rgba(0,0,0,0.15) !important; z-index: 3000 !important; }
        
        .fw-black { font-weight: 900; }
        .letter-spacing-n1 { letter-spacing: -1px; }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="sidebar" id="mainSidebar"></div>

        <main class="main-panel d-flex flex-column min-vh-100" id="main">
            <div id="header-container"></div>

            <div class="app-content page-content flex-grow-1 py-4">
                <div class="container-fluid px-4">
                    
                    <!-- HEADER -->
                    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4">
                        <div>
                            <h4 class="fw-black text-navy mb-1 letter-spacing-n1">รับรองสาธารณประโยชน์</h4>
                            <nav aria-label="breadcrumb">
                                <ol class="breadcrumb mb-0 small opacity-75">
                                    <li class="breadcrumb-item"><a href="admin_dashboard.html" class="text-decoration-none text-primary">หน้าแรก</a></li>
                                    <li class="breadcrumb-item active">จัดการกิจกรรม</li>
                                </ol>
                            </nav>
                        </div>
                        <div class="d-flex gap-2">
                            <button class="btn btn-white border rounded-pill px-4 fw-bold shadow-sm" onclick="toggleView()">
                                <i class="bi bi-grid-fill me-2" id="viewIcon"></i> สลับมุมมอง
                            </button>
                            <button class="btn btn-navy rounded-pill px-4 fw-bold shadow-sm" onclick="openAddModal()">
                                <i class="bi bi-plus-lg me-2"></i> เพิ่มกิจกรรม
                            </button>
                        </div>
                    </div>

                    <!-- STATS -->
                    <div class="row g-4 mb-4">
                        <div class="col-md-4">
                            <div class="stat-card shadow-sm border-0">
                                <div class="stat-icon bg-warning-subtle text-warning"><i class="bi bi-hourglass-split"></i></div>
                                <div class="small text-muted fw-bold mb-1">รอการตรวจสอบ</div>
                                <h3 class="fw-black text-navy mb-0" id="stat-pending">0</h3>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="stat-card shadow-sm border-0">
                                <div class="stat-icon bg-success-subtle text-success"><i class="bi bi-check-circle-fill"></i></div>
                                <div class="small text-muted fw-bold mb-1">อนุมัติแล้ว (ครั้ง)</div>
                                <h3 class="fw-black text-navy mb-0" id="stat-approved">0</h3>
                                <div class="progress mt-2" style="height: 4px;">
                                    <div id="stat-progress-bar" class="progress-bar bg-success" style="width: 0%"></div>
                                </div>
                                <div class="text-muted" style="font-size: 0.6rem; margin-top: 5px;">เป้าหมาย 20 ครั้ง/เทอม</div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="stat-card shadow-sm border-0">
                                <div class="stat-icon bg-primary-subtle text-primary"><i class="bi bi-people-fill"></i></div>
                                <div class="small text-muted fw-bold mb-1">นักเรียนที่บันทึกข้อมูล</div>
                                <h3 class="fw-black text-navy mb-0" id="stat-students">0</h3>
                            </div>
                        </div>
                    </div>

                    <!-- FILTERS -->
                    <div class="bg-white rounded-5 p-4 shadow-sm mb-4 border border-white">
                        <div class="row g-3">
                            <div class="col-md-5">
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-0 rounded-start-pill px-3"><i class="bi bi-search"></i></span>
                                    <input type="text" id="searchInput" class="form-control bg-light border-0 rounded-end-pill py-2" placeholder="ค้นหาชื่อนักเรียน หรือชื่อกิจกรรม...">
                                </div>
                            </div>
                            <div class="col-md-3">
                                <select id="filterStatus" class="form-select bg-light border-0 rounded-pill py-2">
                                    <option value="">ทุกสถานะ</option>
                                    <option value="pending" selected>รอตรวจสอบ (Pending)</option>
                                    <option value="approved">อนุมัติแล้ว (Approved)</option>
                                    <option value="rejected">ไม่ผ่าน (Rejected)</option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <button class="btn btn-primary w-100 rounded-pill py-2 fw-bold" onclick="loadData()">กรองข้อมูล</button>
                            </div>
                        </div>
                    </div>

                    <!-- DATA DISPLAY -->
                    <div id="dataContainer" class="row g-4">
                        <!-- Cards or Table load here -->
                    </div>

                </div>
            </div>
        </main>
    </div>

    <!-- EDIT MODAL -->
    <div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 30px;">
                <div class="modal-header border-0 p-4 pb-0">
                    <h5 class="fw-black text-navy mb-0">แก้ไขข้อมูลสาธารณประโยชน์</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="editForm" class="row g-3">
                        <input type="hidden" name="id" id="edit-id">
                        <div class="col-12">
                            <label class="form-label small fw-bold text-navy">นักเรียนเจ้าของข้อมูล</label>
                            <select id="edit-student-select" name="student_internal_id" class="form-select" required></select>
                        </div>
                        <div class="col-md-8">
                            <label class="form-label small fw-bold text-navy">ชื่อกิจกรรม</label>
                            <input type="text" name="activity_name" id="edit-name" class="form-control border-0 bg-light rounded-3 py-2" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-bold text-navy">วันที่</label>
                            <input type="date" name="activity_date" id="edit-date" class="form-control border-0 bg-light rounded-3 py-2" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label small fw-bold text-navy">สถานที่</label>
                            <input type="text" name="location" id="edit-loc" class="form-control border-0 bg-light rounded-3 py-2" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label small fw-bold text-navy">ผลที่เกิด / ประทับใจ</label>
                            <textarea name="impact_benefit" id="edit-impact" class="form-control border-0 bg-light rounded-3 py-2" rows="3"></textarea>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold text-navy">ผู้รับรอง</label>
                            <input type="text" name="certifier_name" id="edit-certifier" class="form-control border-0 bg-light rounded-3 py-2" placeholder="ชื่อครูหรือผู้รับรอง">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold text-navy">สถานะ</label>
                            <select name="status" id="edit-status" class="form-select border-0 bg-light rounded-3 py-2">
                                <option value="pending">รอตรวจสอบ (Pending)</option>
                                <option value="approved">อนุมัติ (Approved)</option>
                                <option value="rejected">ปฏิเสธ (Rejected)</option>
                            </select>
                        </div>
                        <div class="col-12 mt-4 d-flex gap-2">
                            <button type="button" class="btn btn-light rounded-pill px-4 flex-grow-1" data-bs-dismiss="modal">ยกเลิก</button>
                            <button type="submit" class="btn btn-primary rounded-pill px-4 flex-grow-2 fw-bold">บันทึกการแก้ไข</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>
    <script src="../public/js/main.js"></script>
    <script>
        let currentView = 'card';
        let allRecords = [];
        let studentChoices;

        document.addEventListener('DOMContentLoaded', async () => {
            await checkAuth(['admin', 'teacher']);
            initChoices();
            loadData();
            document.getElementById('editForm').onsubmit = handleUpdate;
        });

        function initChoices() {
            studentChoices = new Choices('#edit-student-select', {
                searchEnabled: true,
                placeholder: true,
                placeholderValue: 'ค้นหานักเรียน...',
                noResultsText: 'ไม่พบนักเรียน',
                shouldSort: false
            });
            // Initial load of some students
            loadStudents('');
        }

        async function loadStudents(q) {
            try {
                const res = await fetch(`../api/get_students_list.php?q=${q}`);
                const data = await res.json();
                if(data.success) {
                    const list = data.students.map(s => ({
                        value: s.id,
                        label: `${s.code} - ${s.name} (${s.room})`
                    }));
                    studentChoices.setChoices(list, 'value', 'label', true);
                }
            } catch (e) {}
        }

        async function loadData() {
            const status = document.getElementById('filterStatus').value;
            const search = document.getElementById('searchInput').value;
            const type = (await checkAuth()).role === 'teacher' ? 'room' : '';
            
            try {
                const res = await fetch(`../api/public_service.php?status=${status}&search=${search}&type=${type}`);
                const data = await res.json();
                if(data.success) {
                    allRecords = data.records;
                    updateStats(data.stats);
                    renderData();
                }
            } catch (e) { console.error(e); }
        }

        function updateStats(stats) {
            if(!stats) return;
            document.getElementById('stat-pending').innerText = stats.pending_count || 0;
            document.getElementById('stat-approved').innerText = stats.approved_count || 0;
            document.getElementById('stat-students').innerText = stats.total_students || 0;
            
            if (stats.avg_progress !== undefined) {
                document.getElementById('stat-progress-bar').style.width = stats.avg_progress + '%';
            }
        }

        function renderData() {
            const container = document.getElementById('dataContainer');
            if(allRecords.length === 0) {
                container.innerHTML = '<div class="col-12 text-center py-5 text-muted bg-white rounded-5 border border-dashed">ไม่พบข้อมูลที่ตรงตามเงื่อนไข</div>';
                return;
            }

            // Batch action bar — only show if there are pending records
            const pendingCount = allRecords.filter(r => r.status === 'pending').length;
            const batchBar = `
                <div class="col-12 mb-3">
                    <div class="bg-white rounded-3 shadow-sm p-3 d-flex flex-wrap align-items-center gap-2">
                        <div class="d-flex align-items-center gap-2">
                            <input type="checkbox" id="batchSelectAll" class="form-check-input" onchange="toggleSelectAllBatch(this)">
                            <label for="batchSelectAll" class="fw-bold small text-muted">เลือกทุกแถวที่รอตรวจสอบ (${pendingCount})</label>
                        </div>
                        <div class="ms-auto d-flex gap-2">
                            <span class="badge bg-light text-dark border" id="batchSelectedCount">เลือก 0 รายการ</span>
                            <button class="btn btn-success btn-sm rounded-pill px-3" onclick="batchUpdate('approved')">
                                <i class="bi bi-check2-all me-1"></i> อนุมัติที่เลือก
                            </button>
                            <button class="btn btn-outline-danger btn-sm rounded-pill px-3" onclick="batchUpdate('rejected')">
                                <i class="bi bi-x-circle me-1"></i> ปฏิเสธที่เลือก
                            </button>
                        </div>
                    </div>
                </div>`;

            if (currentView === 'card') {
                container.innerHTML = batchBar + allRecords.map(r => renderCard(r)).join('');
            } else {
                container.innerHTML = batchBar + `<div class="col-12"><div class="bg-white rounded-4 overflow-hidden border shadow-sm"><table class="table align-middle mb-0"><thead><tr><th style="width:50px;"></th><th>นักเรียน</th><th>กิจกรรม</th><th>วันที่</th><th>สถานะ</th><th>จัดการ</th></tr></thead><tbody>${allRecords.map(r => renderTableRow(r)).join('')}</tbody></table></div></div>`;
            }
        }

        function toggleSelectAllBatch(cb) {
            document.querySelectorAll('.batch-row-check').forEach(c => { c.checked = cb.checked; });
            updateBatchSelectedCount();
        }

        function updateBatchSelectedCount() {
            const n = document.querySelectorAll('.batch-row-check:checked').length;
            const el = document.getElementById('batchSelectedCount');
            if (el) el.textContent = `เลือก ${n} รายการ`;
        }

        async function batchUpdate(status) {
            const ids = Array.from(document.querySelectorAll('.batch-row-check:checked')).map(c => Number(c.value));
            if (ids.length === 0) {
                Swal.fire('ไม่ได้เลือก', 'กรุณาเลือกอย่างน้อย 1 รายการ', 'warning');
                return;
            }
            const confirm = await Swal.fire({
                title: status === 'approved' ? `อนุมัติ ${ids.length} รายการ?` : `ปฏิเสธ ${ids.length} รายการ?`,
                icon: 'question',
                showCancelButton: true,
                confirmButtonText: status === 'approved' ? 'อนุมัติ' : 'ปฏิเสธ',
                cancelButtonText: 'ยกเลิก',
                confirmButtonColor: status === 'approved' ? '#10b981' : '#ef4444',
            });
            if (!confirm.isConfirmed) return;

            try {
                const res = await fetch('../api/public_service.php', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ batch: true, ids, status }),
                });
                const j = await res.json();
                if (j.success) {
                    Swal.fire('สำเร็จ', j.message || `ดำเนินการ ${ids.length} รายการ`, 'success');
                    loadRecords();
                } else {
                    Swal.fire('ผิดพลาด', j.error || 'ไม่สามารถดำเนินการได้', 'error');
                }
            } catch (e) {
                Swal.fire('ผิดพลาด', 'เชื่อมต่อ server ไม่ได้', 'error');
            }
        }

        function renderCard(r) {
            const statusCls = r.status === 'approved' ? 'status-approved' : (r.status === 'rejected' ? 'status-rejected' : 'status-pending');
            const statusTxt = r.status === 'approved' ? 'อนุมัติแล้ว' : (r.status === 'rejected' ? 'ปฏิเสธ' : 'รอตรวจสอบ');
            const avatar = r.photo ? `../${r.photo}` : '../public/img/default-avatar.png';
            
            return `
                <div class="col-md-6 col-lg-4">
                    <div class="record-card shadow-sm">
                        <div class="card-header-student">
                            <img src="${avatar}" class="student-avatar" onerror="this.src='../public/img/default-avatar.png'">
                            <div class="overflow-hidden">
                                <div class="fw-bold text-navy text-truncate">${r.first_name_th} ${r.last_name_th}</div>
                                <div class="small text-muted">ID: ${r.student_code} • ห้อง ${r.class_name || '-'}</div>
                            </div>
                        </div>
                        <div class="p-4 flex-grow-1">
                            <div class="d-flex justify-content-between mb-3">
                                <span class="status-pill ${statusCls}">${statusTxt}</span>
                                <span class="small text-muted"><i class="bi bi-calendar3 me-1"></i>${r.activity_date_th}</span>
                            </div>
                            <h6 class="fw-black text-navy mb-2">${r.activity_name}</h6>
                            <div class="small text-muted mb-2"><i class="bi bi-geo-alt-fill me-1 text-primary"></i> ${r.location}</div>
                            <div class="p-3 bg-light rounded-3 small text-muted border-start border-primary border-4">
                                "${r.impact_benefit || '-'}"
                            </div>
                        </div>
                        <div class="px-4 py-3 bg-light d-flex justify-content-end gap-2 border-top">
                            <button class="btn-action btn-edit" onclick="openEditModal(${r.id})" title="แก้ไขข้อมูล"><i class="bi bi-pencil-square"></i></button>
                            ${r.status === 'pending' ? `
                                <button class="btn-action btn-approve" onclick="updateStatus(${r.id}, 'approved')" title="อนุมัติ"><i class="bi bi-check-lg"></i></button>
                                <button class="btn-action btn-reject" onclick="updateStatus(${r.id}, 'rejected')" title="ปฏิเสธ"><i class="bi bi-x-lg"></i></button>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `;
        }

        function renderTableRow(r) {
            const statusCls = r.status === 'approved' ? 'status-approved' : (r.status === 'rejected' ? 'status-rejected' : 'status-pending');
            const isPending = r.status === 'pending';
            return `
                <tr>
                    <td>${isPending ? `<input type="checkbox" class="form-check-input batch-row-check" value="${r.id}" onchange="updateBatchSelectedCount()">` : ''}</td>
                    <td>
                        <div class="d-flex align-items-center gap-2">
                            <div>
                                <div class="fw-bold text-navy">${r.first_name_th} ${r.last_name_th}</div>
                                <div class="small text-muted">ID ${r.student_code} · ห้อง ${r.class_name || '-'}</div>
                            </div>
                        </div>
                    </td>
                    <td><div class="fw-bold">${r.activity_name}</div><div class="small text-muted">${r.location || ''}</div></td>
                    <td class="small">${r.activity_date_th}</td>
                    <td><span class="status-pill ${statusCls}">${r.status}</span></td>
                    <td>
                        <div class="d-flex gap-1">
                            ${isPending ? `
                                <button class="btn btn-sm btn-success" onclick="updateStatus(${r.id}, 'approved')" title="อนุมัติ"><i class="bi bi-check"></i></button>
                                <button class="btn btn-sm btn-outline-danger" onclick="updateStatus(${r.id}, 'rejected')" title="ปฏิเสธ"><i class="bi bi-x"></i></button>
                            ` : ''}
                            <button class="btn btn-sm btn-light border" onclick="openEditModal(${r.id})"><i class="bi bi-pencil"></i></button>
                        </div>
                    </td>
                </tr>
            `;
        }

        function toggleView() {
            currentView = currentView === 'card' ? 'table' : 'card';
            const icon = document.getElementById('viewIcon');
            icon.className = currentView === 'card' ? 'bi bi-grid-fill me-2' : 'bi bi-list me-2';
            renderData();
        }

        function openAddModal() {
            document.getElementById('editForm').reset();
            document.getElementById('edit-id').value = '';
            document.querySelector('#editModal .modal-title || h5').innerText = 'เพิ่มกิจกรรมสาธารณประโยชน์';
            studentChoices.removeActiveItems();
            new bootstrap.Modal('#editModal').show();
        }

        function openEditModal(id) {
            const r = allRecords.find(x => x.id == id);
            if(!r) return;

            document.getElementById('edit-id').value = r.id;
            document.getElementById('edit-name').value = r.activity_name;
            document.getElementById('edit-date').value = r.activity_date;
            document.getElementById('edit-loc').value = r.location;
            document.getElementById('edit-impact').value = r.impact_benefit;
            document.getElementById('edit-certifier').value = r.certifier_name || '';
            document.getElementById('edit-status').value = r.status;
            document.querySelector('#editModal .modal-title || h5').innerText = 'แก้ไขข้อมูลสาธารณประโยชน์';

            // Set student choice
            studentChoices.setChoices([{
                value: r.student_id,
                label: `${r.student_code} - ${r.first_name_th} ${r.last_name_th} (ห้อง ${r.room || '-'})`,
                selected: true
            }], 'value', 'label', true);

            new bootstrap.Modal('#editModal').show();
        }

        async function handleUpdate(e) {
            e.preventDefault();
            const fd = new FormData(e.target);
            const data = Object.fromEntries(fd.entries());
            const id = document.getElementById('edit-id').value;
            const method = id ? 'PUT' : 'POST';
            if (id) data.full_edit = true;

            try {
                const res = await fetch('../api/public_service.php', {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const resData = await res.json();
                if(resData.success) {
                    Swal.fire({ icon: 'success', title: id ? 'อัปเดตสำเร็จ' : 'เพิ่มข้อมูลสำเร็จ', timer: 1500, showConfirmButton: false });
                    bootstrap.Modal.getInstance('#editModal').hide();
                    loadData();
                }
            } catch (e) { Swal.fire('Error', 'Operation failed', 'error'); }
        }

        async function updateStatus(id, status) {
            const confirmed = await Swal.fire({
                title: status === 'approved' ? 'ยืนยันการอนุมัติ?' : 'ยืนยันการปฏิเสธ?',
                text: "การดำเนินการนี้จะไม่สามารถย้อนกลับได้",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonText: 'ตกลง',
                cancelButtonText: 'ยกเลิก',
                confirmButtonColor: status === 'approved' ? '#10b981' : '#f43f5e'
            });

            if(!confirmed.isConfirmed) return;

            try {
                const res = await fetch('../api/public_service.php', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id, status })
                });
                if((await res.json()).success) {
                    loadData();
                }
            } catch (e) {}
        }
    </script>
</body>
</html>
