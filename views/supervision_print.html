<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8" />
    <title>พิมพ์รูปเล่มรายงานการนิเทศ | CNP APP</title>
    <meta content='width=device-width, initial-scale=1.0, shrink-to-fit=no' name='viewport' />
    
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700;900&family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <!-- Core CSS -->
    <link rel="stylesheet" href="../public/css/style.css">
    
    <style>
        body { font-family: 'Google Sans', 'Sarabun', sans-serif; background-color: #f4f7fa; color: #1e293b; }
        
        .bg-gradient-navy {
            background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 100%);
        }
        .text-navy { color: #1e3a8a; }

        .dashboard-panel {
            background: white;
            border-radius: 24px;
            padding: 25px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 20px rgba(0,0,0,0.01);
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
    <div class="wrapper">
        <aside class="sidebar" id="mainSidebar"></aside>

        <main class="main-panel d-flex flex-column min-vh-100" id="main">
            <div class="app-content page-content flex-grow-1">
                <div class="container-fluid">
                    
                    <!-- Back Button and Header -->
                    <div class="d-flex align-items-center gap-3 mb-4">
                        <a href="teacher_supervision.html" class="btn btn-light rounded-circle shadow-sm border" style="width: 45px; height: 45px; display: flex; align-items: center; justify-content: center;">
                            <i class="bi bi-arrow-left fs-5"></i>
                        </a>
                        <div>
                            <h4 class="fw-black text-navy mb-0">พิมพ์เล่มรายงานนิเทศ</h4>
                            <div class="text-muted small">พิมพ์รายงานผลสรุปคะแนนประเมินและความคิดเห็นของกรรมการนิเทศ</div>
                        </div>
                    </div>

                    <div class="dashboard-panel text-center py-5">
                        <div id="print-content-box">
                            <div class="text-center py-5 text-muted small">กำลังโหลดข้อมูล...</div>
                        </div>
                    </div>

                </div>
            </div>
            <footer id="footer-container" class="app-footer text-center text-md-start mt-auto pb-4"></footer>
        </main>
    </div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../public/js/main.js"></script>
    <script>
        let currentUser = null;

        document.addEventListener('DOMContentLoaded', async () => {
            currentUser = await checkAuth(['teacher', 'admin']);
            if (currentUser) {
                await loadPrintData();
            }
        });

        async function loadPrintData() {
            try {
                const res = await fetch('../api/teacher/supervision_get.php');
                const data = await res.json();
                if (data.success) {
                    renderPrintContent(data.booking);
                }
            } catch (err) {
                console.error("Error loading print metadata: ", err);
            }
        }

        function renderPrintContent(booking) {
            const box = document.getElementById('print-content-box');
            if (booking && booking.status === 'completed') {
                box.innerHTML = `
                    <i class="bi bi-file-earmark-pdf-fill text-primary display-2 mb-4 d-block"></i>
                    <h4 class="fw-black text-navy mb-2">รายงานผลการนิเทศการสอนเสร็จสมบูรณ์!</h4>
                    <p class="text-muted small mb-4">เล่มเอกสารบันทึกข้อความสรุปผลคะแนนและความเห็นจากคณะกรรมการนิเทศพร้อมพิมพ์เรียบร้อยแล้ว</p>
                    <a href="../api/teacher/supervision_print.php?booking_id=${booking.id}" target="_blank" class="btn btn-primary rounded-pill px-5 py-3 fw-black shadow-lg"><i class="bi bi-printer-fill me-2"></i> สั่งพิมพ์เล่มรายงานนิเทศการสอน</a>
                `;
            } else {
                box.innerHTML = `
                    <i class="bi bi-lock-fill text-muted display-2 mb-4 d-block"></i>
                    <h5 class="fw-bold text-muted mb-2">ปุ่มพิมพ์เอกสารจะทำงานเมื่อการนิเทศเสร็จสิ้นแล้ว</h5>
                    <p class="text-muted small">กรุณาดำเนินการขั้นตอนการตรวจประเมิน และบันทึกหลังการสอนให้ครบถ้วนก่อน</p>
                `;
            }
        }
    </script>
</body>

</html>
